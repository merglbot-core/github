name: ENT App + v5 Coverage Watch (drift detector)

# Daily read-only drift detector for fleet-wide PR-Assistant coverage. It does NOT
# mutate anything — it surfaces gaps an agent/owner must close:
#   - a NEW org not in the SSOT allowlist (BEST-EFFORT only — see below);
#   - a protected repo missing the required check "Merglbot PR Assistant v5".
# It FAILS CLOSED: any non-404 API error makes the scan INCONCLUSIVE (never a silent
# "no drift"), and on drift/inconclusive it fails and upserts a single tracking issue.
#
# Authoritative-source caveat: new-org detection uses /user/orgs, which only returns
# orgs the token is a member of — a brand-new org the token is not yet in is invisible
# here. The authoritative coverage controls are the manually-maintained SSOT list +
# the owner's org-creation process / App-installation review; this workflow does not
# claim complete enterprise coverage on its own.

on:
  schedule:
    - cron: "0 6 * * *"  # daily 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

concurrency:
  group: ent-app-coverage-watch
  cancel-in-progress: false

env:
  V5_CHECK: "Merglbot PR Assistant v5"
  # SSOT: the 14 known orgs. App-installed today: all except the two pending.
  SSOT_ORGS: "Merglevsky-cz lrtch merglbot-core merglbot-public merglbot-denatura merglbot-shared merglbot-proteinaco merglbot-ruzovyslon merglbot-milan-private merglbot-extractors merglbot-autodoplnky merglbot-hodinarstvibechyne merglbot-kiteboarding merglbot-cerano"
  APP_ORGS: "merglbot-core merglbot-public merglbot-denatura merglbot-shared merglbot-proteinaco merglbot-ruzovyslon merglbot-milan-private merglbot-extractors merglbot-autodoplnky merglbot-hodinarstvibechyne merglbot-kiteboarding merglbot-cerano"
  TRACKING_TITLE: "ENT coverage drift (PR Assistant App / v5 required check)"

jobs:
  watch:
    name: Detect coverage drift
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Detect drift
        id: drift
        env:
          GH_TOKEN: ${{ secrets.ENTERPRISE_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          report="$(mktemp)"
          errfile="$(mktemp)"   # one line per non-404 API error → scan is partial
          drift=0

          # Read a gh api endpoint. Returns 0 + stdout on success; 44 on an EXPECTED
          # 404 (absent resource); 1 on any OTHER error (rate-limit/403/network/5xx),
          # which is recorded so an incomplete scan can never masquerade as "no drift".
          # (The errfile write survives the command-substitution subshell.)
          gh_read() {
            local out err
            err="$(mktemp)"
            if out="$(gh api "$@" 2>"$err")"; then rm -f "$err"; printf '%s' "$out"; return 0; fi
            if grep -qiE 'HTTP 404|Not Found|Branch not protected' "$err"; then rm -f "$err"; return 44; fi
            echo "gh api $*: $(tr '\n' ' ' < "$err" | head -c 300)" >> "$errfile"
            rm -f "$err"; return 1
          }

          # 1) New org not in SSOT. NOTE: /user/orgs is BEST-EFFORT — it only returns
          # orgs the token is a member of, so a brand-new org the token is not yet in
          # is invisible here. The authoritative coverage control is the SSOT list
          # (manually maintained) + the owner's org-creation process / App-install
          # review; this check is a convenience cross-reference, not a completeness
          # guarantee.
          echo "## New orgs vs SSOT (best-effort via /user/orgs — NOT authoritative)" >> "$report"
          new_orgs=0
          if orgs_seen="$(gh_read /user/orgs --paginate --jq '.[].login')"; then
            while IFS= read -r org; do
              [ -z "$org" ] && continue
              case " $SSOT_ORGS " in
                *" $org "*) : ;;
                *) echo "- $org (not in SSOT)" >> "$report"; new_orgs=$((new_orgs+1)); drift=1 ;;
              esac
            done <<< "$orgs_seen"
            [ "$new_orgs" -eq 0 ] && echo "- (none beyond SSOT, best-effort)" >> "$report"
          else
            echo "- (inconclusive — /user/orgs unavailable; see scan errors)" >> "$report"
          fi

          # 2) Protected repos in App-installed orgs missing the v5 required check.
          echo "" >> "$report"
          echo "## Protected repos missing the '$V5_CHECK' required check" >> "$report"
          missing=0
          for org in $APP_ORGS; do
            if ! repos_list="$(gh_read "orgs/${org}/repos" --paginate --jq '.[] | select(.archived==false) | .name')"; then
              echo "- (could not enumerate ${org} — scan partial)" >> "$report"
              continue
            fi
            while IFS= read -r repo; do
              [ -z "$repo" ] && continue
              full="${org}/${repo}"
              if ! branch="$(gh_read "repos/${full}" --jq '.default_branch')"; then continue; fi
              # `.protected` boolean: false = no BP (tracked in #665), not a drift.
              if ! isprot="$(gh_read "repos/${full}/branches/${branch}" --jq '.protected')"; then continue; fi
              [ "$isprot" != "true" ] && continue
              if ctx="$(gh_read "repos/${full}/branches/${branch}/protection" \
                   --jq '(.required_status_checks.contexts // [])[], (.required_status_checks.checks // [])[].context')"; then
                if ! printf '%s\n' "$ctx" | grep -qxF "$V5_CHECK"; then
                  echo "- ${full}:${branch}" >> "$report"; missing=$((missing+1)); drift=1
                fi
              fi
            done <<< "$repos_list"
          done
          [ "$missing" -eq 0 ] && echo "- (none)" >> "$report"

          # Fail CLOSED: any non-404 API error means the scan was incomplete, so a
          # clean "drift=0" cannot be asserted. Treat inconclusive as drift.
          scan_errors="$(grep -c . "$errfile" || true)"
          inconclusive=0
          if [ "${scan_errors:-0}" -gt 0 ]; then
            inconclusive=1; drift=1
            echo "" >> "$report"
            echo "## ⚠️ Scan INCOMPLETE — ${scan_errors} API error(s); result is INCONCLUSIVE (not 'no drift')" >> "$report"
            sed 's/^/- /' "$errfile" >> "$report"
          fi

          delim="DRIFT_REPORT_${GITHUB_RUN_ID:-0}_${GITHUB_RUN_ATTEMPT:-0}"
          {
            echo "report<<${delim}"
            cat "$report"
            echo "${delim}"
            echo "drift=${drift}"
            echo "inconclusive=${inconclusive}"
          } >> "$GITHUB_OUTPUT"
          echo "drift=${drift} inconclusive=${inconclusive} (new_orgs=${new_orgs}, repos_missing_v5=${missing}, scan_errors=${scan_errors:-0})"

      - name: Upsert tracking issue on drift
        if: ${{ steps.drift.outputs.drift == '1' }}
        env:
          GH_TOKEN: ${{ secrets.ENTERPRISE_GITHUB_TOKEN }}
          REPORT: ${{ steps.drift.outputs.report }}
        run: |
          set -euo pipefail
          body="$(printf 'Automated daily drift report (read-only watcher).\n\n%s\n\n_Generated by ent-app-coverage-watch.yml on %s._\n' "$REPORT" "$(date -u +%Y-%m-%dT%H:%M:%SZ)")"
          num="$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "${TRACKING_TITLE} in:title" --json number --jq '.[0].number // empty')"
          if [ -n "$num" ]; then
            gh issue comment "$num" --repo "$GITHUB_REPOSITORY" --body "$body"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$TRACKING_TITLE" --body "$body"
          fi

      - name: Fail the run on drift or incomplete scan
        if: ${{ steps.drift.outputs.drift == '1' }}
        run: |
          if [ "${{ steps.drift.outputs.inconclusive }}" = "1" ]; then
            echo "::error::Coverage scan was INCOMPLETE (API errors) — cannot assert 'no drift'. See the tracking issue."
          else
            echo "::error::ENT coverage drift detected — see the tracking issue."
          fi
          exit 1
