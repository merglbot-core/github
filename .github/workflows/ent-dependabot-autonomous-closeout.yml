name: ENT Dependabot Autonomous Closeout

on:
  workflow_call:
    inputs:
      mode:
        description: "Execution mode: dry-run does not write; apply may close/merge/policy-align."
        required: false
        type: string
        default: dry-run
      repo_scope:
        description: "Scope selector: all, cohort, or single_repo."
        required: false
        type: string
        default: all
      single_repo:
        description: "owner/repo when repo_scope=single_repo."
        required: false
        type: string
        default: ""
      max_parallel_repos:
        description: "Upper bound recorded in receipts; mutation lane remains repo-sequential."
        required: false
        type: number
        default: 3
      max_prs_per_repo:
        description: "0 means unlimited."
        required: false
        type: number
        default: 0
      allow_policy_alignment:
        description: "Allow bounded branch-protection review-gate alignment with snapshots."
        required: false
        type: boolean
        default: true
      comment_report:
        description: "Post the weekly report to the tracking issue."
        required: false
        type: boolean
        default: false
      tracking_issue:
        description: "Tracking issue URL for weekly receipts."
        required: false
        type: string
        default: "https://github.com/merglbot-public/docs/issues/636"
      slack_notify:
        description: "Post the run telemetry summary to Slack via SLACK_DEPENDABOT_WEBHOOK_URL."
        required: false
        type: boolean
        default: true
      pr_allowlist:
        description: "Optional comma/space/newline-separated owner/repo#PR or PR URLs approved for apply mode."
        required: false
        type: string
        default: ""
      approval_note:
        description: "Human approval note recorded in the receipt for user-approved apply runs."
        required: false
        type: string
        default: ""
      approval_issue_url:
        description: "Optional GitHub issue URL containing the apply approval packet."
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      mode:
        description: "Execution mode"
        required: true
        type: choice
        options:
          - dry-run
          - apply
        default: dry-run
      repo_scope:
        description: "Scope selector"
        required: true
        type: choice
        options:
          - all
          - single_repo
        default: all
      single_repo:
        description: "owner/repo when repo_scope=single_repo"
        required: false
        type: string
      max_prs_per_repo:
        description: "0 means unlimited"
        required: false
        type: number
        default: 0
      allow_policy_alignment:
        description: "Allow bounded branch-protection review-gate alignment"
        required: false
        type: boolean
        default: true
      comment_report:
        description: "Post report to tracking issue"
        required: false
        type: boolean
        default: false
      tracking_issue:
        description: "Tracking issue URL"
        required: false
        type: string
        default: "https://github.com/merglbot-public/docs/issues/636"
      slack_notify:
        description: "Post the run telemetry summary to Slack"
        required: false
        type: boolean
        default: true
      pr_allowlist:
        description: "Optional owner/repo#PR or PR URLs approved for apply mode"
        required: false
        type: string
      approval_note:
        description: "Human approval note recorded in the receipt"
        required: false
        type: string

permissions:
  actions: read
  checks: read
  contents: read
  issues: write
  pull-requests: write
  statuses: read

concurrency:
  group: ent-dependabot-autonomous-closeout-${{ github.event_name }}-${{ inputs.mode || 'dry-run' }}-${{ inputs.repo_scope || 'all' }}-${{ inputs.single_repo || 'all' }}
  cancel-in-progress: false

jobs:
  closeout:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout github control plane
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run ENT Dependabot autonomous closeout
        env:
          GH_TOKEN: ${{ secrets.ENTERPRISE_GITHUB_TOKEN || github.token }}
          INPUT_MODE: ${{ inputs.mode || 'dry-run' }}
          INPUT_REPO_SCOPE: ${{ inputs.repo_scope || 'all' }}
          INPUT_SINGLE_REPO: ${{ inputs.single_repo || '' }}
          INPUT_MAX_PARALLEL_REPOS: ${{ inputs.max_parallel_repos || 3 }}
          INPUT_MAX_PRS_PER_REPO: ${{ inputs.max_prs_per_repo || 0 }}
          INPUT_ALLOW_POLICY_ALIGNMENT: ${{ inputs.allow_policy_alignment }}
          INPUT_COMMENT_REPORT: ${{ inputs.comment_report }}
          INPUT_TRACKING_ISSUE: ${{ inputs.tracking_issue || 'https://github.com/merglbot-public/docs/issues/636' }}
          INPUT_SLACK_NOTIFY: ${{ inputs.slack_notify }}
          INPUT_PR_ALLOWLIST: ${{ inputs.pr_allowlist || '' }}
          INPUT_APPROVAL_NOTE: ${{ inputs.approval_note || '' }}
          INPUT_APPROVAL_ISSUE_URL: ${{ inputs.approval_issue_url || '' }}
          SLACK_DEPENDABOT_WEBHOOK_URL: ${{ secrets.SLACK_DEPENDABOT_WEBHOOK_URL }}
          ENT_DEPENDABOT_REVIEW_WAIT_SECONDS: "1500"
          ENT_DEPENDABOT_REVIEW_POLL_SECONDS: "60"
          ENT_DEPENDABOT_REBASE_WAIT_SECONDS: "600"
          ENT_DEPENDABOT_REBASE_POLL_SECONDS: "60"
        run: |
          set -euo pipefail

          MODE="$INPUT_MODE"
          REPO_SCOPE="$INPUT_REPO_SCOPE"
          SINGLE_REPO="$INPUT_SINGLE_REPO"
          MAX_PARALLEL_REPOS="$INPUT_MAX_PARALLEL_REPOS"
          MAX_PRS_PER_REPO="$INPUT_MAX_PRS_PER_REPO"
          ALLOW_POLICY_ALIGNMENT="$INPUT_ALLOW_POLICY_ALIGNMENT"
          COMMENT_REPORT="$INPUT_COMMENT_REPORT"
          TRACKING_ISSUE="$INPUT_TRACKING_ISSUE"
          SLACK_NOTIFY="$INPUT_SLACK_NOTIFY"
          PR_ALLOWLIST="$INPUT_PR_ALLOWLIST"
          APPROVAL_NOTE="$INPUT_APPROVAL_NOTE"
          APPROVAL_ISSUE_URL="$INPUT_APPROVAL_ISSUE_URL"

          ARGS=(
            --mode "$MODE"
            --repo-scope "$REPO_SCOPE"
            --max-parallel-repos "$MAX_PARALLEL_REPOS"
            --max-prs-per-repo "$MAX_PRS_PER_REPO"
            --output-dir "reports/ent-dependabot-weekly"
            --tracking-issue "$TRACKING_ISSUE"
            --pr-allowlist "$PR_ALLOWLIST"
            --approval-note "$APPROVAL_NOTE"
            --approval-issue-url "$APPROVAL_ISSUE_URL"
          )

          if [ -n "$SINGLE_REPO" ]; then
            ARGS+=(--single-repo "$SINGLE_REPO")
          fi
          if [ "$ALLOW_POLICY_ALIGNMENT" = "true" ]; then
            ARGS+=(--allow-policy-alignment)
          fi
          if [ "$COMMENT_REPORT" = "true" ]; then
            ARGS+=(--comment-report)
          fi
          if [ "$SLACK_NOTIFY" = "true" ] && [ -n "${SLACK_DEPENDABOT_WEBHOOK_URL:-}" ]; then
            ARGS+=(--slack-notify)
          fi

          mkdir -p reports/ent-dependabot-weekly
          python3 scripts/dependabot/ent_dependabot_closeout.py "${ARGS[@]}" | tee reports/ent-dependabot-weekly/stdout.json
          {
            echo "## ENT Dependabot Autonomous Closeout"
            echo ""
            cat reports/ent-dependabot-weekly/summary.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post Slack fallback if closeout crashes before receipt
        if: failure() && inputs.slack_notify
        env:
          SLACK_DEPENDABOT_WEBHOOK_URL: ${{ secrets.SLACK_DEPENDABOT_WEBHOOK_URL }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -u
          if [ -f reports/ent-dependabot-weekly/ent_dependabot_weekly_receipt.json ]; then
            exit 0
          fi
          if [ -z "${SLACK_DEPENDABOT_WEBHOOK_URL:-}" ]; then
            exit 0
          fi
          python3 - <<'PY'
          import json
          import os
          import sys
          from urllib.request import Request, urlopen

          payload = {
              "text": (
                  "*ENT Dependabot Weekly Closeout* `workflow_failed_before_receipt`\n"
                  f"Run: {os.environ.get('GITHUB_RUN_URL', 'not available')}"
              )
          }
          try:
              request = Request(
                  os.environ["SLACK_DEPENDABOT_WEBHOOK_URL"],
                  data=json.dumps(payload).encode("utf-8"),
                  headers={"Content-Type": "application/json"},
                  method="POST",
              )
              with urlopen(request, timeout=15) as response:
                  response.read()
          except Exception:
              sys.exit(0)
          PY

      - name: Upload weekly receipt artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: ent-dependabot-weekly-${{ github.run_id }}
          path: reports/ent-dependabot-weekly/
          retention-days: 90
