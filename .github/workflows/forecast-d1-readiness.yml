      - name: Generate test Slack artifacts (all scopes)
        id: test_slack_artifacts
        if: github.event_name == 'workflow_dispatch' && inputs.send_test_slack_messages == true
        run: |
          set -euo pipefail

          BASE="forecast-d1-readiness-slack-test"
          rm -rf "$BASE"

          BASE="$BASE" python - <<'PY'
          import csv
          from datetime import datetime, timedelta
          import json
          import os
          from pathlib import Path
          from zoneinfo import ZoneInfo

          base = Path(os.environ.get("BASE", "forecast-d1-readiness-slack-test"))
          tz = ZoneInfo("Europe/Prague")
          now = datetime.now(tz=tz).replace(second=0, microsecond=0)
          offset = now.utcoffset() or timedelta(0)
          offset_hours = int(offset.total_seconds() // 3600)

          patch_d1 = (now.date() - timedelta(days=1)).isoformat()
          patch_d2 = (now.date() - timedelta(days=2)).isoformat()

          REPORT_FIELDS = [
              "project_id",
              "tenant",
              "country",
              "slot",
              "required_policy",
              "patch_date_local",
              "is_required",
              "table_fq",
              "status",
              "reason",
              "row_count",
              "sessions_sum",
              "revenue_db_sum",
              "transactions_db_sum",
              "actuals_sum",
              "cost_sum",
              "cost_present",
              "error_snippet",
              "status_13",
              "reason_13",
              "table_fq_14",
              "domain",
              "status_14",
              "reason_14",
              "row_count_14",
              "sessions_sum_14",
              "revenue_db_sum_14",
              "transactions_db_sum_14",
              "actuals_sum_14",
              "cost_sum_14",
              "cost_present_14",
              "error_snippet_14",
          ]
          CHANNEL_FIELDS = [
              "tenant",
              "country",
              "channel",
              "row_count",
              "revenue_db_sum",
              "cost_sum",
              "cost_present",
              "status",
              "reason",
          ]
          CHANNEL14_FIELDS = [
              "tenant",
              "country",
              "channel",
              "row_count",
              "sessions_sum",
              "revenue_db_sum",
              "transactions_db_sum",
              "actuals_sum",
              "cost_sum",
              "cost_present",
              "status",
              "reason",
          ]

          def _utc_hour(local_hour: int) -> int:
              return (local_hour - offset_hours) % 24

          def _schedule(minute: int, local_hour: int) -> str:
              return f"{minute} {_utc_hour(local_hour)} * * *"

          def _now_local_iso(local_hour: int, minute: int) -> str:
              return now.replace(hour=local_hour, minute=minute).isoformat()

          def _write_json(path: Path, payload: dict) -> None:
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")

          def _write_csv(path: Path, fieldnames: list[str], rows: list[dict]) -> None:
              path.parent.mkdir(parents=True, exist_ok=True)
              with path.open("w", encoding="utf-8", newline="") as f:
                  w = csv.DictWriter(f, fieldnames=fieldnames)
                  w.writeheader()
                  for r in rows:
                      w.writerow({k: ("" if r.get(k) is None else r.get(k)) for k in fieldnames})

          def _make_scope(
              *,
              scope: str,
              label: str,
              minute: int,
              local_hour: int,
              items: list[dict],
          ) -> dict[str, str]:
              outdir = base / scope / "out"
              outdir_d2 = base / scope / "out-d2"
              outdir.mkdir(parents=True, exist_ok=True)
              outdir_d2.mkdir(parents=True, exist_ok=True)

              sched = _schedule(minute, local_hour)
              now_local = _now_local_iso(local_hour, minute)
              slot = f"{local_hour:02d}"

              def _summary(patch_date: str) -> dict:
                  return {
                      "status": "PASS",
                      "slot": slot,
                      "required_policy": "all",
                      "timezone": "Europe/Prague",
                      "patch_date_local": patch_date,
                      "github_event_schedule": sched,
                      "now_local": now_local,
                      "checked_at_utc": datetime.utcnow().replace(microsecond=0).isoformat() + "Z",
                      "pipelines_total": len(items),
                      "required_total": len(items),
                      "required_failed": 0,
                      "optional_total": 0,
                      "optional_failed": 0,
                      "mode": "auto",
                      "kind": "readiness",
                      "spec_filters": {
                          "include_tenant": [],
                          "exclude_tenant": [],
                          "include_country": [],
                          "exclude_country": [],
                      },
                  }

              _write_json(outdir / "forecast_d1_readiness_summary.json", _summary(patch_d1))
              _write_json(outdir_d2 / "forecast_d1_readiness_summary.json", _summary(patch_d2))

              report_rows_d1: list[dict] = []
              report_rows_d2: list[dict] = []
              ch_rows_d1: list[dict] = []
              ch_rows_d2: list[dict] = []
              ch14_rows_d1: list[dict] = []
              ch14_rows_d2: list[dict] = []

              for it in items:
                  tenant = it["tenant"]
                  country = it["country"]
                  domain = it.get("domain", "")
                  channels = it.get("channels", [])
                  channels14 = it.get("channels14", channels)

                  def _report_row(*, patch_date: str, sessions: float, rev: float, tx: float, cost: float) -> dict:
                      actuals = abs(sessions) + abs(rev) + abs(tx)
                      return {
                          "project_id": "slack-test",
                          "tenant": tenant,
                          "country": country,
                          "slot": slot,
                          "required_policy": "all",
                          "patch_date_local": patch_date,
                          "is_required": "yes",
                          "table_fq": f"slack_test.visualisation_final.{tenant}_{country}_table",
                          "status": "PASS",
                          "reason": "",
                          "row_count": "123",
                          "sessions_sum": f"{sessions:.6f}",
                          "revenue_db_sum": f"{rev:.6f}",
                          "transactions_db_sum": f"{tx:.6f}",
                          "actuals_sum": f"{actuals:.6f}",
                          "cost_sum": f"{cost:.6f}",
                          "cost_present": "yes",
                          "error_snippet": "",
                          "status_13": "PASS",
                          "reason_13": "",
                          "table_fq_14": f"slack_test.visualisation_final.14_{tenant}_{country}_union",
                          "domain": domain,
                          "status_14": "PASS",
                          "reason_14": "",
                          "row_count_14": "10",
                          "sessions_sum_14": f"{sessions:.6f}",
                          "revenue_db_sum_14": f"{rev:.6f}",
                          "transactions_db_sum_14": f"{tx:.6f}",
                          "actuals_sum_14": f"{actuals:.6f}",
                          "cost_sum_14": f"{cost:.6f}",
                          "cost_present_14": "yes",
                          "error_snippet_14": "",
                      }

                  report_rows_d1.append(_report_row(patch_date=patch_d1, sessions=100.0, rev=1000.0, tx=1.0, cost=200.0))
                  report_rows_d2.append(_report_row(patch_date=patch_d2, sessions=80.0, rev=800.0, tx=1.0, cost=160.0))

                  for ch in channels:
                      ch_rows_d1.append(
                          {
                              "tenant": tenant,
                              "country": country,
                              "channel": ch,
                              "row_count": "50",
                              "revenue_db_sum": "1000.000000",
                              "cost_sum": "200.000000",
                              "cost_present": "yes",
                              "status": "OK",
                              "reason": "",
                          }
                      )
                      ch_rows_d2.append(
                          {
                              "tenant": tenant,
                              "country": country,
                              "channel": ch,
                              "row_count": "40",
                              "revenue_db_sum": "800.000000",
                              "cost_sum": "160.000000",
                              "cost_present": "yes",
                              "status": "OK",
                              "reason": "",
                          }
                      )

                  for ch in channels14:
                      ch14_rows_d1.append(
                          {
                              "tenant": tenant,
                              "country": country,
                              "channel": ch,
                              "row_count": "10",
                              "sessions_sum": "100.000000",
                              "revenue_db_sum": "1000.000000",
                              "transactions_db_sum": "1.000000",
                              "actuals_sum": "1101.000000",
                              "cost_sum": "200.000000",
                              "cost_present": "yes",
                              "status": "OK",
                              "reason": "",
                          }
                      )
                      ch14_rows_d2.append(
                          {
                              "tenant": tenant,
                              "country": country,
                              "channel": ch,
                              "row_count": "10",
                              "sessions_sum": "80.000000",
                              "revenue_db_sum": "800.000000",
                              "transactions_db_sum": "1.000000",
                              "actuals_sum": "881.000000",
                              "cost_sum": "160.000000",
                              "cost_present": "yes",
                              "status": "OK",
                              "reason": "",
                          }
                      )

              _write_csv(outdir / "forecast_d1_readiness_report.csv", REPORT_FIELDS, report_rows_d1)
              _write_csv(outdir / "forecast_d1_readiness_channels_report.csv", CHANNEL_FIELDS, ch_rows_d1)
              _write_csv(outdir / "forecast_d1_readiness_channels14_report.csv", CHANNEL14_FIELDS, ch14_rows_d1)

              _write_csv(outdir_d2 / "forecast_d1_readiness_report.csv", REPORT_FIELDS, report_rows_d2)
              _write_csv(outdir_d2 / "forecast_d1_readiness_channels_report.csv", CHANNEL_FIELDS, ch_rows_d2)
              _write_csv(outdir_d2 / "forecast_d1_readiness_channels14_report.csv", CHANNEL14_FIELDS, ch14_rows_d2)

              return {
                  f"{scope}_status": "PASS",
                  f"{scope}_outdir": str(outdir),
                  f"{scope}_outdir_d2": str(outdir_d2),
                  f"{scope}_scope_label": f"TEST {label}",
              }

          base.mkdir(parents=True, exist_ok=True)
          outputs: dict[str, str] = {}

              outputs.update(
                  _make_scope(
                  scope="denatura",
                  label="denatura",
                  minute=15,
                  local_hour=8,
                  items=[
                      {"tenant": "denatura", "country": "cz", "domain": "denatura.cz", "channels": ["Google ads pmax", "Facebook"]},
                      {"tenant": "denatura", "country": "sk", "domain": "denatura.sk", "channels": ["Google ads pmax", "Facebook"]},
                  ],
              )
          )
              outputs.update(
                  _make_scope(
                  scope="cerano_livero",
                  label="cerano+livero",
                  minute=0,
                  local_hour=9,
                  items=[
                      {"tenant": "cerano", "country": "cz", "domain": "cerano.cz", "channels": ["Google Ads", "Facebook"]},
                      {"tenant": "livero", "country": "cz", "domain": "livero.cz", "channels": ["Google Ads", "Facebook"]},
                  ],
              )
          )
              outputs.update(
                  _make_scope(
                  scope="proteinaco",
                  label="proteinaco",
                  minute=20,
                  local_hour=9,
                  items=[
                      {"tenant": "proteinaco", "country": "cz", "domain": "proteinaco.cz", "channels": ["Google Ads", "Facebook"]},
                  ],
              )
          )
              outputs.update(
                  _make_scope(
                  scope="ruzovyslon",
                  label="ruzovyslon",
                  minute=15,
                  local_hour=9,
                  items=[
                      {"tenant": "ruzovyslon", "country": "cz", "domain": "ruzovyslon.cz", "channels": ["Google ads pmax"]},
                  ],
              )
          )
              outputs.update(
                  _make_scope(
                  scope="autodoplnky",
                  label="autodoplnky",
                  minute=5,
                  local_hour=9,
                  items=[
                      {"tenant": "autodoplnky", "country": "cz", "domain": "autodoplnky.cz", "channels": ["Google Ads", "Facebook"]},
                  ],
              )
          )

          out_path = Path(os.environ["GITHUB_OUTPUT"])  # provided by Actions
          with out_path.open("a", encoding="utf-8") as f:
              for k, v in outputs.items():
                  f.write(f"{k}={v}\n")
          PY

      - name: Slack alert (PASS/FAIL)
        if: >-
          ${{
            always() &&
            inputs.dry_run != true &&
            (
              inputs.send_test_slack_messages == true ||
              (steps.guardrail.outputs.exit_code != '' && steps.guardrail.outputs.status != 'NOOP') ||
              (steps.guardrail_proteinaco.outputs.exit_code != '' && steps.guardrail_proteinaco.outputs.status != 'NOOP') ||
              (steps.guardrail_ruzovyslon.outputs.exit_code != '' && steps.guardrail_ruzovyslon.outputs.status != 'NOOP') ||
              (steps.guardrail_autodoplnky.outputs.exit_code != '' && steps.guardrail_autodoplnky.outputs.status != 'NOOP')
            )
          }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_FINAL_DATA_ALERTS || secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          MAIN_STATUS: ${{ steps.guardrail.outputs.status }}
          OUTDIR: ${{ steps.guardrail.outputs.outdir }}
          OUTDIR_D2: ${{ steps.guardrail_d2.outputs.outdir }}
          SCOPE_LABEL: ${{ steps.guardrail.outputs.scope_label }}
          DENATURA_STATUS: ${{ steps.test_slack_artifacts.outputs.denatura_status }}
          DENATURA_OUTDIR: ${{ steps.test_slack_artifacts.outputs.denatura_outdir }}
          DENATURA_OUTDIR_D2: ${{ steps.test_slack_artifacts.outputs.denatura_outdir_d2 }}
          DENATURA_SCOPE_LABEL: ${{ steps.test_slack_artifacts.outputs.denatura_scope_label }}
          CERANO_LIVERO_STATUS: ${{ steps.test_slack_artifacts.outputs.cerano_livero_status }}
