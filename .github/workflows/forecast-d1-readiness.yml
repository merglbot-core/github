      - name: Upload Autodoplnky guardrail artifacts
        if: always() && steps.guardrail_autodoplnky.outputs.outdir != '' && steps.guardrail_autodoplnky.outputs.status != 'NOOP'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: forecast-d1-readiness-autodoplnky-${{ github.run_id }}
