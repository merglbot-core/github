name: Forecast D-1 Readiness Guardrail (hourly 08:20–15:20 + Denatura 08:15/10:15 + Cerano/Livero 09:00/11:00 + Proteinaco 09:20/11:20 + Ruzovyslon 09:15/11:15 + Autodoplnky 09:05/12:05 Europe/Prague)

on:
  schedule:
    # GitHub cron is UTC. To keep 08:20–15:20 Europe/Prague stable across DST, we schedule a UTC superset
    # and let the script auto-NOOP outside the local execution window.
    #
    # Local window (Europe/Prague):
    # - CET  (UTC+1): 08:20–15:20 local -> 07:20–14:20 UTC
    # - CEST (UTC+2): 08:20–15:20 local -> 06:20–13:20 UTC
    #
    # UTC superset: 06:20–14:20 UTC (9 crons). Script gating yields exactly 8 local runs/day.
    - cron: "20 6 * * *"
    - cron: "20 7 * * *"
    - cron: "20 8 * * *"
    - cron: "20 9 * * *"
    - cron: "20 10 * * *"
    - cron: "20 11 * * *"
    - cron: "20 12 * * *"
    - cron: "20 13 * * *"
    - cron: "20 14 * * *"

    # Denatura (CZ+SK) dedicated runs at 08:15 and 10:15 Europe/Prague.
    # GitHub cron is UTC, so we schedule a UTC superset and gate inside the script (DST-safe).
    #
    # 08:15 Europe/Prague:
    # - CET  (UTC+1): 08:15 local -> 07:15 UTC
    # - CEST (UTC+2): 08:15 local -> 06:15 UTC
    #
    # 10:15 Europe/Prague:
    # - CET  (UTC+1): 10:15 local -> 09:15 UTC
    # - CEST (UTC+2): 10:15 local -> 08:15 UTC
    - cron: "15 6 * * *"
    - cron: "15 7 * * *"
    - cron: "15 8 * * *"
    - cron: "15 9 * * *"

    # Ruzovyslon dedicated runs at 09:15 and 11:15 Europe/Prague.
    # GitHub cron is UTC; we reuse the 15 7/8/9 entries above and add 15 10 for CET 11:15.
    #
    # 09:15 Europe/Prague:
    # - CET  (UTC+1): 09:15 local -> 08:15 UTC (already scheduled above)
    # - CEST (UTC+2): 09:15 local -> 07:15 UTC (already scheduled above)
    #
    # 11:15 Europe/Prague:
    # - CET  (UTC+1): 11:15 local -> 10:15 UTC
    # - CEST (UTC+2): 11:15 local -> 09:15 UTC (already scheduled above)
    - cron: "15 10 * * *"

    # Autodoplnky dedicated runs at 09:05 and 12:05 Europe/Prague.
    # GitHub cron is UTC, so we schedule a UTC superset and gate inside the script (DST-safe).
    #
    # 09:05 Europe/Prague:
    # - CET  (UTC+1): 09:05 local -> 08:05 UTC
    # - CEST (UTC+2): 09:05 local -> 07:05 UTC
    #
    # 12:05 Europe/Prague:
    # - CET  (UTC+1): 12:05 local -> 11:05 UTC
    # - CEST (UTC+2): 12:05 local -> 10:05 UTC
    - cron: "5 7 * * *"
    - cron: "5 8 * * *"
    - cron: "5 10 * * *"
    - cron: "5 11 * * *"

    # Cerano + Livero dedicated runs at 09:00 and 11:00 Europe/Prague.
    # GitHub cron is UTC, so we schedule a UTC superset and gate inside the script (DST-safe).
    #
    # 09:00 Europe/Prague:
    # - CET  (UTC+1): 09:00 local -> 08:00 UTC (already scheduled below)
    # - CEST (UTC+2): 09:00 local -> 07:00 UTC
    #
    # 11:00 Europe/Prague:
    # - CET  (UTC+1): 11:00 local -> 10:00 UTC
    # - CEST (UTC+2): 11:00 local -> 09:00 UTC (already scheduled below)
    - cron: "0 7 * * *"
    - cron: "0 10 * * *"

    # Daily success-rate report at 10:00 Europe/Prague (DST-safe via UTC superset + script NOOP gating).
    # - CEST (UTC+2): 10:00 local -> 08:00 UTC
    # - CET  (UTC+1): 10:00 local -> 09:00 UTC
    - cron: "0 8 * * *"
    - cron: "0 9 * * *"

  workflow_dispatch:
    inputs:
      patch_date_local:
        description: "Date to check (YYYY-MM-DD, Europe/Prague). Default: yesterday."
        required: false
        type: string
      dry_run:
        description: "Skip Slack notifications"
        required: false
        type: boolean
        default: true
      send_test_slack_messages:
        description: "Send synthetic test Slack messages for all isolated scopes (no BigQuery). Requires dry_run=false."
        required: false
        type: boolean
        default: false
      send_success_rate:
        description: "Also send daily 30d success-rate message (10:00-style)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write  # For WIF/OIDC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    name: Forecast D-1 readiness
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'schedule' && (startsWith(github.event.schedule, '20 ') || startsWith(github.event.schedule, '15 ') || startsWith(github.event.schedule, '5 ') || startsWith(github.event.schedule, '0 ')))
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: Authenticate to GCP via WIF (and install gcloud/bq/gsutil)
        if: inputs.send_test_slack_messages != true
        uses: ./.github/actions/setup-gcp-auth
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Run forecast D-1 readiness
        id: guardrail
        if: >-
          ${{
            inputs.send_test_slack_messages != true &&
            (
              github.event_name == 'workflow_dispatch' ||
              (github.event_name == 'schedule' && (startsWith(github.event.schedule, '20 ') || startsWith(github.event.schedule, '15 ') || startsWith(github.event.schedule, '0 ')))
            )
          }}
        continue-on-error: true
        env:
          PATCH_DATE_LOCAL: ${{ inputs.patch_date_local }}
          MODE: ${{ github.event_name == 'workflow_dispatch' && 'manual' || 'auto' }}
          GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          set -euo pipefail
          OUTDIR="forecast-d1-readiness-out"

          CMD=(
            python scripts/guardrails/forecast_d1_readiness.py
            --outdir "$OUTDIR"
            --timezone "Europe/Prague"
            --mode "$MODE"
          )
          if [[ -n "${PATCH_DATE_LOCAL:-}" ]]; then
            CMD+=( --patch-date-local "$PATCH_DATE_LOCAL" )
          fi

          EXTRA_ARGS=()
          if [[ "${MODE}" == "auto" ]]; then
            case "${GITHUB_EVENT_SCHEDULE:-}" in
              15\ *)
                EXTRA_ARGS+=( --include-tenant "denatura" --auto-utc-minute "15" --auto-local-hour "8" --auto-local-hour "10" )
                ;;
              20\ *)
                EXTRA_ARGS+=( --exclude-tenant "denatura" --exclude-tenant "cerano" --exclude-tenant "livero" --exclude-tenant "proteinaco" --exclude-tenant "ruzovyslon" --exclude-tenant "autodoplnky" --allow-empty-specs )
                ;;
              0\ *)
                EXTRA_ARGS+=( --include-tenant "cerano" --include-tenant "livero" --auto-utc-minute "0" --auto-local-hour "9" --auto-local-hour "11" )
                ;;
            esac
          fi
          if [[ "${#EXTRA_ARGS[@]}" -gt 0 ]]; then
            CMD+=( "${EXTRA_ARGS[@]}" )
          fi

          SCOPE_LABEL="all"
          if [[ "${MODE}" == "auto" ]]; then
            case "${GITHUB_EVENT_SCHEDULE:-}" in
              15\ *) SCOPE_LABEL="denatura" ;;
              0\ *) SCOPE_LABEL="cerano+livero" ;;
              20\ *) SCOPE_LABEL="core" ;;
            esac
          fi

          printf 'Running:'
          printf ' %q' "${CMD[@]}"
          printf '\n'
          EXIT=0
          "${CMD[@]}" || EXIT=$?

          echo "outdir=${OUTDIR}" >> "$GITHUB_OUTPUT"
          echo "exit_code=${EXIT}" >> "$GITHUB_OUTPUT"
          echo "scope_label=${SCOPE_LABEL}" >> "$GITHUB_OUTPUT"

          SUMMARY_JSON="${OUTDIR}/forecast_d1_readiness_summary.json"
          if [ -f "$SUMMARY_JSON" ]; then
            SUMMARY_JSON="$SUMMARY_JSON" python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          from pathlib import Path

          p = Path(os.environ["SUMMARY_JSON"])
          s = json.loads(p.read_text(encoding="utf-8"))

          def _v(key: str, default: str = "") -> str:
              v = s.get(key, default)
              return "" if v is None else str(v)

          print(f"status={_v('status')}")
          print(f"slot={_v('slot')}")
          print(f"patch_date_local={_v('patch_date_local')}")
          print(f"required_policy={_v('required_policy')}")
          print(f"required_failed={_v('required_failed', '0')}")
          print(f"optional_failed={_v('optional_failed', '0')}")
          print(f"required_total={_v('required_total', '0')}")
          print(f"optional_total={_v('optional_total', '0')}")
          PY
          else
            echo "status=FAIL" >> "$GITHUB_OUTPUT"
            echo "slot=" >> "$GITHUB_OUTPUT"
            echo "patch_date_local=" >> "$GITHUB_OUTPUT"
            echo "required_policy=" >> "$GITHUB_OUTPUT"
            echo "required_failed=0" >> "$GITHUB_OUTPUT"
            echo "optional_failed=0" >> "$GITHUB_OUTPUT"
            echo "required_total=0" >> "$GITHUB_OUTPUT"
            echo "optional_total=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Run forecast D-2 readiness (info only)
        id: guardrail_d2
        if: >-
          ${{
            inputs.send_test_slack_messages != true &&
            (
              github.event_name == 'workflow_dispatch' ||
              (github.event_name == 'schedule' && (startsWith(github.event.schedule, '20 ') || startsWith(github.event.schedule, '15 ') || startsWith(github.event.schedule, '0 ')))
            )
          }}
        continue-on-error: true
        env:
          PATCH_DATE_LOCAL_D1: ${{ steps.guardrail.outputs.patch_date_local }}
          MODE: ${{ github.event_name == 'workflow_dispatch' && 'manual' || 'auto' }}
          GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          set -euo pipefail
          OUTDIR="forecast-d1-readiness-out-d2"
          mkdir -p "$OUTDIR"
          echo "outdir=${OUTDIR}" >> "$GITHUB_OUTPUT"

          PATCH_DATE_LOCAL_D1="${PATCH_DATE_LOCAL_D1:-}"
          if [ -z "${PATCH_DATE_LOCAL_D1}" ]; then
            echo "ℹ️ Missing D-1 patch_date_local; skipping D-2 run."
            echo "outdir=${OUTDIR}" >> "$GITHUB_OUTPUT"
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
            echo "status=NOOP" >> "$GITHUB_OUTPUT"
            echo "slot=" >> "$GITHUB_OUTPUT"
            echo "patch_date_local=" >> "$GITHUB_OUTPUT"
            echo "required_policy=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PATCH_DATE_LOCAL_D2="$(
            PATCH_DATE_LOCAL_D1="$PATCH_DATE_LOCAL_D1" python - <<'PY'
          from datetime import date, timedelta
          import os

          d = date.fromisoformat(os.environ["PATCH_DATE_LOCAL_D1"])
          print((d - timedelta(days=1)).isoformat())
          PY
          )"

          CMD=(
            python scripts/guardrails/forecast_d1_readiness.py
            --outdir "$OUTDIR"
            --timezone "Europe/Prague"
            --mode "$MODE"
            --patch-date-local "$PATCH_DATE_LOCAL_D2"
          )

          EXTRA_ARGS=()
          if [[ "${MODE}" == "auto" ]]; then
            case "${GITHUB_EVENT_SCHEDULE:-}" in
              15\ *)
                EXTRA_ARGS+=( --include-tenant "denatura" --auto-utc-minute "15" --auto-local-hour "8" --auto-local-hour "10" )
                ;;
              20\ *)
                EXTRA_ARGS+=( --exclude-tenant "denatura" --exclude-tenant "cerano" --exclude-tenant "livero" --exclude-tenant "proteinaco" --exclude-tenant "ruzovyslon" --exclude-tenant "autodoplnky" --allow-empty-specs )
                ;;
              0\ *)
                EXTRA_ARGS+=( --include-tenant "cerano" --include-tenant "livero" --auto-utc-minute "0" --auto-local-hour "9" --auto-local-hour "11" )
                ;;
            esac
          fi
          if [[ "${#EXTRA_ARGS[@]}" -gt 0 ]]; then
            CMD+=( "${EXTRA_ARGS[@]}" )
          fi

          printf 'Running:'
          printf ' %q' "${CMD[@]}"
          printf '\n'
          EXIT=0
          "${CMD[@]}" || EXIT=$?

          echo "outdir=${OUTDIR}" >> "$GITHUB_OUTPUT"
          echo "exit_code=${EXIT}" >> "$GITHUB_OUTPUT"

          SUMMARY_JSON="${OUTDIR}/forecast_d1_readiness_summary.json"
          if [ -f "$SUMMARY_JSON" ]; then
            SUMMARY_JSON="$SUMMARY_JSON" python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          from pathlib import Path

          p = Path(os.environ["SUMMARY_JSON"])
          s = json.loads(p.read_text(encoding="utf-8"))

          def _v(key: str, default: str = "") -> str:
              v = s.get(key, default)
              return "" if v is None else str(v)

          print(f"status={_v('status')}")
          print(f"slot={_v('slot')}")
          print(f"patch_date_local={_v('patch_date_local')}")
          print(f"required_policy={_v('required_policy')}")
          PY
          else
            echo "status=FAIL" >> "$GITHUB_OUTPUT"
            echo "slot=" >> "$GITHUB_OUTPUT"
            echo "patch_date_local=${PATCH_DATE_LOCAL_D2}" >> "$GITHUB_OUTPUT"
            echo "required_policy=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run forecast D-1 readiness (Proteinaco)
        id: guardrail_proteinaco
        if: inputs.send_test_slack_messages != true && github.event_name == 'schedule' && startsWith(github.event.schedule, '20 ')
        continue-on-error: true
        env:
          PATCH_DATE_LOCAL: ${{ inputs.patch_date_local }}
          MODE: ${{ github.event_name == 'workflow_dispatch' && 'manual' || 'auto' }}
          GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          set -euo pipefail
          OUTDIR="forecast-d1-readiness-out-proteinaco"

          CMD=(
            python scripts/guardrails/forecast_d1_readiness.py
            --outdir "$OUTDIR"
            --timezone "Europe/Prague"
            --mode "$MODE"
            --include-tenant "proteinaco"
            --auto-utc-minute "20"
            --auto-local-hour "9"
            --auto-local-hour "11"
          )
          if [[ -n "${PATCH_DATE_LOCAL:-}" ]]; then
            CMD+=( --patch-date-local "$PATCH_DATE_LOCAL" )
          fi

          printf 'Running (proteinaco):'
          printf ' %q' "${CMD[@]}"
          printf '\n'
          EXIT=0
          "${CMD[@]}" || EXIT=$?

          echo "outdir=${OUTDIR}" >> "$GITHUB_OUTPUT"
          echo "exit_code=${EXIT}" >> "$GITHUB_OUTPUT"
          echo "scope_label=proteinaco" >> "$GITHUB_OUTPUT"

          SUMMARY_JSON="${OUTDIR}/forecast_d1_readiness_summary.json"
          if [ -f "$SUMMARY_JSON" ]; then
            SUMMARY_JSON="$SUMMARY_JSON" python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          from pathlib import Path

          p = Path(os.environ["SUMMARY_JSON"])
          s = json.loads(p.read_text(encoding="utf-8"))

          def _v(key: str, default: str = "") -> str:
              v = s.get(key, default)
              return "" if v is None else str(v)

          print(f"status={_v('status')}")
          print(f"slot={_v('slot')}")
          print(f"patch_date_local={_v('patch_date_local')}")
          print(f"required_policy={_v('required_policy')}")
          PY
          else
            echo "status=FAIL" >> "$GITHUB_OUTPUT"
            echo "slot=" >> "$GITHUB_OUTPUT"
            echo "patch_date_local=" >> "$GITHUB_OUTPUT"
            echo "required_policy=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run forecast D-2 readiness (Proteinaco, info only)
        id: guardrail_d2_proteinaco
        if: inputs.send_test_slack_messages != true && github.event_name == 'schedule' && startsWith(github.event.schedule, '20 ')
        continue-on-error: true
        env:
          PATCH_DATE_LOCAL_D1: ${{ steps.guardrail_proteinaco.outputs.patch_date_local }}
          MODE: ${{ github.event_name == 'workflow_dispatch' && 'manual' || 'auto' }}
          GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          set -euo pipefail
          OUTDIR="forecast-d1-readiness-out-d2-proteinaco"
          mkdir -p "$OUTDIR"
          echo "outdir=${OUTDIR}" >> "$GITHUB_OUTPUT"

          PATCH_DATE_LOCAL_D1="${PATCH_DATE_LOCAL_D1:-}"
          if [ -z "${PATCH_DATE_LOCAL_D1}" ]; then
            echo "ℹ️ Missing Proteinaco D-1 patch_date_local; skipping D-2 run."
            echo "outdir=${OUTDIR}" >> "$GITHUB_OUTPUT"
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
            echo "status=NOOP" >> "$GITHUB_OUTPUT"
            echo "slot=" >> "$GITHUB_OUTPUT"
            echo "patch_date_local=" >> "$GITHUB_OUTPUT"
            echo "required_policy=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PATCH_DATE_LOCAL_D2="$(
            PATCH_DATE_LOCAL_D1="$PATCH_DATE_LOCAL_D1" python - <<'PY'
          from datetime import date, timedelta
          import os

          d = date.fromisoformat(os.environ["PATCH_DATE_LOCAL_D1"])
          print((d - timedelta(days=1)).isoformat())
          PY
          )"

          CMD=(
            python scripts/guardrails/forecast_d1_readiness.py
            --outdir "$OUTDIR"
            --timezone "Europe/Prague"
            --mode "$MODE"
            --patch-date-local "$PATCH_DATE_LOCAL_D2"
            --include-tenant "proteinaco"
            --auto-utc-minute "20"
            --auto-local-hour "9"
            --auto-local-hour "11"
          )

          printf 'Running (proteinaco D-2):'
          printf ' %q' "${CMD[@]}"
          printf '\n'
          EXIT=0
          "${CMD[@]}" || EXIT=$?

          echo "outdir=${OUTDIR}" >> "$GITHUB_OUTPUT"
          echo "exit_code=${EXIT}" >> "$GITHUB_OUTPUT"

          SUMMARY_JSON="${OUTDIR}/forecast_d1_readiness_summary.json"
          if [ -f "$SUMMARY_JSON" ]; then
            SUMMARY_JSON="$SUMMARY_JSON" python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          from pathlib import Path

          p = Path(os.environ["SUMMARY_JSON"])
          s = json.loads(p.read_text(encoding="utf-8"))

          def _v(key: str, default: str = "") -> str:
              v = s.get(key, default)
              return "" if v is None else str(v)

          print(f"status={_v('status')}")
          print(f"slot={_v('slot')}")
          print(f"patch_date_local={_v('patch_date_local')}")
          print(f"required_policy={_v('required_policy')}")
          PY
          else
            echo "status=FAIL" >> "$GITHUB_OUTPUT"
            echo "slot=" >> "$GITHUB_OUTPUT"
            echo "patch_date_local=" >> "$GITHUB_OUTPUT"
            echo "required_policy=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run forecast D-1 readiness (Ruzovyslon)
        id: guardrail_ruzovyslon
        if: inputs.send_test_slack_messages != true && github.event_name == 'schedule' && startsWith(github.event.schedule, '15 ')
        continue-on-error: true
        env:
          PATCH_DATE_LOCAL: ${{ inputs.patch_date_local }}
          MODE: ${{ github.event_name == 'workflow_dispatch' && 'manual' || 'auto' }}
          GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          set -euo pipefail
          OUTDIR="forecast-d1-readiness-out-ruzovyslon"

          CMD=(
            python scripts/guardrails/forecast_d1_readiness.py
            --outdir "$OUTDIR"
            --timezone "Europe/Prague"
            --mode "$MODE"
            --include-tenant "ruzovyslon"
            --auto-utc-minute "15"
            --auto-local-hour "9"
            --auto-local-hour "11"
          )
          if [[ -n "${PATCH_DATE_LOCAL:-}" ]]; then
            CMD+=( --patch-date-local "$PATCH_DATE_LOCAL" )
          fi

          printf 'Running (ruzovyslon):'
          printf ' %q' "${CMD[@]}"
          printf '\n'
          EXIT=0
          "${CMD[@]}" || EXIT=$?

