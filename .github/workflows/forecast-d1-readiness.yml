        if: inputs.send_test_slack_messages != true && github.event_name == 'schedule' && startsWith(github.event.schedule, '15 ')
        continue-on-error: true
        env:
          PATCH_DATE_LOCAL_D1: ${{ steps.guardrail_ruzovyslon.outputs.patch_date_local }}
          MODE: ${{ github.event_name == 'workflow_dispatch' && 'manual' || 'auto' }}
          GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          set -euo pipefail
          OUTDIR="forecast-d1-readiness-out-d2-ruzovyslon"
          mkdir -p "$OUTDIR"
          echo "outdir=${OUTDIR}" >> "$GITHUB_OUTPUT"

          PATCH_DATE_LOCAL_D1="${PATCH_DATE_LOCAL_D1:-}"
          if [ -z "${PATCH_DATE_LOCAL_D1}" ]; then
            echo "ℹ️ Missing Ruzovyslon D-1 patch_date_local; skipping D-2 run."
            echo "outdir=${OUTDIR}" >> "$GITHUB_OUTPUT"
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
            echo "status=NOOP" >> "$GITHUB_OUTPUT"
            echo "slot=" >> "$GITHUB_OUTPUT"
            echo "patch_date_local=" >> "$GITHUB_OUTPUT"
