name: PR Assistant Manifest Sync

on:
  schedule:
    - cron: "10 5 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-assistant-manifest-sync
  cancel-in-progress: false

jobs:
  sync-manifest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Regenerate manifest and target list from live GitHub inventory
        env:
          GH_TOKEN: ${{ secrets.ENTERPRISE_GITHUB_TOKEN || github.token }}
        run: |
          set -euo pipefail
          python3 scripts/pr-assistant/repo-policy-manifest.py sync-manifest-from-github --write --token-env GH_TOKEN
          python3 scripts/pr-assistant/repo-policy-manifest.py sync-target-repos --write

      - name: Create or update manifest sync PR
        env:
          GH_TOKEN: ${{ secrets.ENTERPRISE_GITHUB_TOKEN || github.token }}
        run: |
          set -euo pipefail

          if git diff --quiet -- scripts/pr-assistant/repo-policy-inventory-policy.json scripts/pr-assistant/repo-policy-manifest.json scripts/pr-assistant/target-repos.txt; then
            echo "No enterprise inventory drift detected."
            exit 0
          fi

          git config user.name "merglbot-bot"
          git config user.email "bot@merglbot.ai"

          BRANCH="codex/pr-assistant-manifest-sync"
          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT
          cp scripts/pr-assistant/repo-policy-inventory-policy.json "${TMP_DIR}/repo-policy-inventory-policy.json"
          cp scripts/pr-assistant/repo-policy-manifest.json "${TMP_DIR}/repo-policy-manifest.json"
          cp scripts/pr-assistant/target-repos.txt "${TMP_DIR}/target-repos.txt"

          if git ls-remote --exit-code origin "refs/heads/${BRANCH}" > /dev/null 2>&1; then
            git fetch origin "${BRANCH}:${BRANCH}"
            git restore --source=HEAD --worktree --staged \
              scripts/pr-assistant/repo-policy-inventory-policy.json \
              scripts/pr-assistant/repo-policy-manifest.json \
              scripts/pr-assistant/target-repos.txt
            git checkout "${BRANCH}"
          else
            git checkout -b "${BRANCH}"
          fi

          cp "${TMP_DIR}/repo-policy-inventory-policy.json" scripts/pr-assistant/repo-policy-inventory-policy.json
          cp "${TMP_DIR}/repo-policy-manifest.json" scripts/pr-assistant/repo-policy-manifest.json
          cp "${TMP_DIR}/target-repos.txt" scripts/pr-assistant/target-repos.txt

          git add scripts/pr-assistant/repo-policy-inventory-policy.json \
                  scripts/pr-assistant/repo-policy-manifest.json \
                  scripts/pr-assistant/target-repos.txt

          if git diff --cached --quiet; then
            echo "Manifest sync branch already up to date."
            exit 0
          fi

          git commit -m "chore(pr-assistant): sync enterprise rollout manifest"
          git push --set-upstream origin "${BRANCH}"

          PR_NUMBER="$(gh pr list --head "${BRANCH}" --json number --jq '.[0].number // empty' 2>/dev/null || true)"
          if [ -n "$PR_NUMBER" ]; then
            echo "PR already exists: #$PR_NUMBER"
            exit 0
          fi

          gh pr create \
            --title "chore(pr-assistant): sync enterprise rollout manifest" \
            --body "Auto-generated scope drift update for the PR Assistant enterprise rollout manifest and compatibility target list. This workflow syncs live GitHub org/repo inventory into the generated manifest but does not auto-deploy to newly discovered repos." \
            --base main \
            --head "${BRANCH}"
