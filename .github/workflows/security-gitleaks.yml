# Security: Gitleaks Secret Scanning
# Reusable workflow for detecting secrets in code
#
# Usage:
#   jobs:
#     gitleaks:
#       uses: merglbot-core/github/.github/workflows/security-gitleaks.yml@v2
#       with:
#         fail-on-detection: true  # Optional: fail if secrets found
#
# Purpose: Detect hardcoded secrets, API keys, tokens before they reach production
# Category: Security
# Priority: HIGH
# Status: DRAFT
# Created: 2025-11-12 (Enterprise CI Audit)

name: Security - Gitleaks

on:
  workflow_call:
    inputs:
      fail-on-detection:
        description: 'Fail the workflow if secrets are detected'
        type: boolean
        default: true
        required: false
      
      config-path:
        description: 'Path to custom gitleaks config file (optional)'
        type: string
        default: ''
        required: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Secret Scanning
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    
    steps:
      - name: Validate config path
        id: config
        shell: bash
        run: |
          set -euo pipefail
          config_path="${{ inputs.config-path }}"
          if [ -z "$config_path" ]; then
            echo "path=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          case "$config_path" in
            /*|*../*)
              echo "Invalid config-path: $config_path. Use a repository-relative path without '..'." >&2
              exit 1
              ;;
          esac
          
          echo "path=$config_path" >> "$GITHUB_OUTPUT"
      
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # Full history for comprehensive scanning
          persist-credentials: false

      - name: Scrub checkout auth metadata (avoid false positives)
        shell: bash
        run: |
          set -euo pipefail

          # actions/checkout may add temporary auth headers / includeIf credentials.
          # Secret scanners must not treat these as repo leaks.
          if [ -d .git ]; then
            git config --local --unset-all http.https://github.com/.extraheader || true

            # Remove includeIf entries pointing to temporary credential configs.
            # (actions/checkout normally removes these in its post-step, but scanners run before that.)
            while IFS= read -r key; do
              [ -z "$key" ] && continue
              git config --local --unset-all "$key" || true
            done < <(git config --local --name-only --get-regexp '^includeif\.gitdir:' || true)
          fi
      
      - name: Install Gitleaks CLI
        run: |
          set -euo pipefail
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT
          wget -q -O "$tmp_dir/gitleaks.tgz" https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
          tar -xzf "$tmp_dir/gitleaks.tgz" -C "$tmp_dir" gitleaks
          sudo mv "$tmp_dir/gitleaks" /usr/local/bin/
          gitleaks version
      
      - name: Run Gitleaks
        run: |
          set -euo pipefail
          config_arg=""
          if [ -n "${{ steps.config.outputs.path }}" ]; then
            config_arg="--config=${{ steps.config.outputs.path }}"
          fi
          
          # Run gitleaks and generate SARIF report
          if [ "${{ inputs.fail-on-detection }}" = "true" ]; then
            gitleaks detect --source=. --report-path=gitleaks-report.sarif --report-format=sarif $config_arg --redact --no-git
          else
            gitleaks detect --source=. --report-path=gitleaks-report.sarif --report-format=sarif $config_arg --redact --no-git || true
          fi

      - name: Summarize findings (redacted)
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f gitleaks-report.sarif ]; then
            echo "## Gitleaks results (redacted)" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- No SARIF report found." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "## Gitleaks results (redacted)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          findings_count="$(jq -r '(.runs[0].results // []) | length' gitleaks-report.sarif 2>/dev/null || echo 0)"
          echo "- Findings: **${findings_count}**" >> "$GITHUB_STEP_SUMMARY"

          jq -r '
            (.runs[0].results // [])[0:20][] |
            "- `\(.ruleId // "unknown")` — `\((.locations[0].physicalLocation.artifactLocation.uri // "unknown"))`\(
              if ((.locations[0].physicalLocation.region.startLine // null) | type) == "number"
              then ":" + (.locations[0].physicalLocation.region.startLine | tostring)
              else ""
              end
            )
          ' gitleaks-report.sarif >> "$GITHUB_STEP_SUMMARY" || true

          if [ "${findings_count}" -gt 20 ]; then
            echo "- … plus $((findings_count - 20)) more" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload gitleaks report (SARIF, redacted)
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: gitleaks-report-sarif
          path: gitleaks-report.sarif
          if-no-files-found: ignore
          retention-days: 7
      
      - name: Upload SARIF report
        if: always()
        continue-on-error: true  # SARIF upload may fail in reusable workflow context due to token permissions
        uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e  # v4.32.4
        with:
          sarif_file: gitleaks-report.sarif
          category: gitleaks
          token: ${{ github.token }}
      
      - name: Comment on PR (if secrets found)
        if: failure() && github.event.pull_request.number
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8.0.0
        with:
          github-token: ${{ github.token }}
          script: |
            const pullRequestNumber = context.payload.pull_request?.number;
            if (!pullRequestNumber) {
              core.warning('No pull_request context available. Skipping comment.');
              return;
            }
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pullRequestNumber,
              body: '🔐 **Gitleaks detected potential secrets in this PR!**\n\n' +
                    'Please review the workflow run and remove any hardcoded secrets.\n' +
                    'Use `${{ secrets.SECRET_NAME }}` instead of hardcoded values.\n\n' +
                    'See: https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId
            })
