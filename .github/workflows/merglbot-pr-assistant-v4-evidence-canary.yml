name: Merglbot PR Assistant v4 Evidence Canary

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number"
        required: true
        type: string
      expected_head_sha:
        description: "Expected PR head SHA for fail-closed current-head binding"
        required: true
        type: string
      policy_approval_receipt:
        description: "Public, non-secret policy approval receipt marker for the v4 canary trigger"
        required: true
        type: string
      trigger_comment_id:
        description: "Originating issue comment id when dispatched from comment trigger"
        required: false
        type: string
        default: ""

permissions:
  contents: read
  pull-requests: read
  issues: read
  checks: read

concurrency:
  group: merglbot-review-v4-${{ github.event.issue.number || github.event.inputs.pr_number }}-${{ github.event_name }}-${{ github.event.inputs.expected_head_sha || github.event.comment.id || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  check-trigger:
    name: Check V4 Canary Trigger
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request) ||
      github.event_name == 'workflow_dispatch'
    outputs:
      pr_number: ${{ steps.get_pr.outputs.pr_number }}
      should_run: ${{ steps.get_pr.outputs.should_run }}
      trigger_comment_id: ${{ steps.get_pr.outputs.trigger_comment_id }}
      # Public policy attestation marker only; PR-visible receipts store its SHA-256 digest.
      policy_approval_receipt: ${{ steps.get_pr.outputs.policy_approval_receipt }}
    steps:
      - name: Get PR Number and Canary Approval
        id: get_pr
        env:
          IS_WORKFLOW_DISPATCH: ${{ github.event_name == 'workflow_dispatch' }}
          INPUT_PR_NUMBER: ${{ github.event.inputs.pr_number }}
          INPUT_TRIGGER_COMMENT_ID: ${{ github.event.inputs.trigger_comment_id }}
          INPUT_POLICY_APPROVAL_RECEIPT: ${{ github.event.inputs.policy_approval_receipt }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_ID: ${{ github.event.comment.id }}
          AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association }}
          CANARY_ENABLED: ${{ vars.MERGLBOT_PR_ASSISTANT_V4_CANARY_ENABLED }}
          CANARY_APPROVAL_RECEIPT: ${{ vars.MERGLBOT_PR_ASSISTANT_V4_CANARY_APPROVAL_RECEIPT }}
        run: |
          set -euo pipefail

          v4_command_present() {
            if [ "$IS_WORKFLOW_DISPATCH" = "true" ]; then
              return 0
            fi
            local comment_body
            comment_body="$(jq -r '.comment.body // ""' "$GITHUB_EVENT_PATH")"
            COMMENT_BODY="$comment_body" python3 -c 'import os, re, sys; body = re.sub(r"\s+", " ", os.environ.get("COMMENT_BODY", "")).strip().lower(); body = re.sub(r"[.!?]+$", "", body); parts = body.split(); ok = len(parts) == 2 and parts[0] == "@merglbot" and parts[1] == "review-v4"; sys.exit(0 if ok else 1)'
          }

          write_skip() {
            {
              echo "pr_number=${1:-${ISSUE_NUMBER:-0}}"
              echo "should_run=false"
              echo "trigger_comment_id=${COMMENT_ID:-}"
              echo "policy_approval_receipt="
            } >> "$GITHUB_OUTPUT"
          }

          validate_approval_receipt() {
            local value="${1:-}"
            [[ "$value" =~ ^[A-Za-z0-9._:/@+=,-]{8,512}$ ]]
          }

          # This is intentionally a public policy attestation marker, not a secret.
          # The PR-visible canary receipt stores only its SHA-256 digest.

          if [ "$IS_WORKFLOW_DISPATCH" = "true" ]; then
            if ! [[ "${INPUT_PR_NUMBER:-}" =~ ^[0-9]+$ ]]; then
              echo "::error::Invalid PR number: must be numeric"
              exit 1
            fi
            if [ "${CANARY_ENABLED:-}" != "true" ] || [ -z "${CANARY_APPROVAL_RECEIPT:-}" ]; then
              echo "::error::PR Assistant v4 canary workflow_dispatch is disabled until policy approval vars are set"
              exit 1
            fi
            if ! validate_approval_receipt "${CANARY_APPROVAL_RECEIPT:-}"; then
              echo "::error::MERGLBOT_PR_ASSISTANT_V4_CANARY_APPROVAL_RECEIPT must be a single safe token, 8-512 chars"
              exit 1
            fi
            if ! validate_approval_receipt "${INPUT_POLICY_APPROVAL_RECEIPT:-}"; then
              echo "::error::policy_approval_receipt must be a single safe token, 8-512 chars"
              exit 1
            fi
            if [ "${INPUT_POLICY_APPROVAL_RECEIPT:-}" != "${CANARY_APPROVAL_RECEIPT:-}" ]; then
              echo "::error::policy_approval_receipt does not match the approved v4 canary receipt"
              exit 1
            fi
            {
              echo "pr_number=$INPUT_PR_NUMBER"
              echo "should_run=true"
              echo "trigger_comment_id=${INPUT_TRIGGER_COMMENT_ID:-}"
              echo "policy_approval_receipt=$CANARY_APPROVAL_RECEIPT"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! v4_command_present; then
            echo "Skipping: no exact @merglbot review-v4 command present"
            write_skip "$ISSUE_NUMBER"
            exit 0
          fi
          case "${AUTHOR_ASSOCIATION:-}" in
            OWNER|MEMBER|COLLABORATOR) ;;
            *)
              echo "Skipping: commenter not authorized (author_association=${AUTHOR_ASSOCIATION:-unknown})"
              write_skip "$ISSUE_NUMBER"
              exit 0
              ;;
          esac
          if [ "${CANARY_ENABLED:-}" != "true" ] || [ -z "${CANARY_APPROVAL_RECEIPT:-}" ]; then
            echo "::notice::PR Assistant v4 canary trigger is disabled until policy approval vars are set"
            write_skip "$ISSUE_NUMBER"
            exit 0
          fi
          if ! validate_approval_receipt "${CANARY_APPROVAL_RECEIPT:-}"; then
            echo "::error::MERGLBOT_PR_ASSISTANT_V4_CANARY_APPROVAL_RECEIPT must be a single safe token, 8-512 chars"
            exit 1
          fi
          {
            echo "pr_number=$ISSUE_NUMBER"
            echo "should_run=true"
            echo "trigger_comment_id=${COMMENT_ID:-}"
            echo "policy_approval_receipt=$CANARY_APPROVAL_RECEIPT"
          } >> "$GITHUB_OUTPUT"

  dispatch-review-on-head:
    name: Dispatch V4 Canary On Trusted Base
    needs: check-trigger
    if: github.event_name == 'issue_comment' && needs.check-trigger.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
      contents: read
      pull-requests: read
    steps:
      - name: Dispatch trusted-base v4 canary run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ needs.check-trigger.outputs.pr_number }}
          TRIGGER_COMMENT_ID: ${{ needs.check-trigger.outputs.trigger_comment_id }}
          POLICY_APPROVAL_RECEIPT: ${{ needs.check-trigger.outputs.policy_approval_receipt }}
        run: |
          set -euo pipefail

          gh pr view "$PR_NUMBER" --repo "$GH_REPO" --json headRefOid,headRepository > pr_dispatch.json
          PR_TRUSTED_REF="$(gh repo view "$GH_REPO" --json defaultBranchRef --jq '.defaultBranchRef.name // empty')"
          PR_HEAD_SHA="$(jq -r '.headRefOid // empty' pr_dispatch.json)"
          PR_HEAD_REPO="$(jq -r '.headRepository.nameWithOwner // empty' pr_dispatch.json)"
          SELF_WORKFLOW_REF="${GITHUB_WORKFLOW_REF%@*}"
          SELF_WORKFLOW_FILE="${SELF_WORKFLOW_REF##*/}"

          if [ -z "${PR_TRUSTED_REF:-}" ] || [ -z "${PR_HEAD_SHA:-}" ] || [ -z "${PR_HEAD_REPO:-}" ] || [ -z "${SELF_WORKFLOW_FILE:-}" ]; then
            echo "ERROR: Unable to resolve PR head ref/SHA for v4 canary dispatch" >&2
            exit 1
          fi
          if [ "$PR_HEAD_REPO" != "$GH_REPO" ]; then
            echo "ERROR: Refusing to run v4 canary for fork PR head from ${PR_HEAD_REPO}" >&2
            exit 1
          fi
          gh workflow run "$SELF_WORKFLOW_FILE" \
            --repo "$GH_REPO" \
            --ref "$PR_TRUSTED_REF" \
            -f pr_number="$PR_NUMBER" \
            -f expected_head_sha="$PR_HEAD_SHA" \
            -f policy_approval_receipt="$POLICY_APPROVAL_RECEIPT" \
            -f trigger_comment_id="$TRIGGER_COMMENT_ID"

  v4-evidence-canary:
    name: V4 Evidence Canary
    needs: check-trigger
    if: needs.check-trigger.outputs.should_run == 'true' && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # These are the only write scopes in the canary execution job. They publish
    # the PR comment receipt and the Checks API surface; the runtime remains review-only.
    permissions:
      actions: read
      checks: write
      contents: read
      issues: write
      pull-requests: read
    env:
      PR_NUMBER: ${{ needs.check-trigger.outputs.pr_number }}
      EXPECTED_HEAD_SHA: ${{ github.event.inputs.expected_head_sha }}
      POLICY_APPROVAL_RECEIPT: ${{ needs.check-trigger.outputs.policy_approval_receipt }}
      TRIGGER_COMMENT_ID: ${{ github.event.inputs.trigger_comment_id || needs.check-trigger.outputs.trigger_comment_id || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2, refs/tags/v6.0.2
        with:
          persist-credentials: false

      - name: Validate v4 canary policy
        run: |
          set -euo pipefail
          python3 scripts/pr-assistant/pr-assistant-v4-evidence-canary.py validate-config

      - name: Gather current-head context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if ! [[ "${PR_NUMBER:-}" =~ ^[0-9]+$ ]]; then
            echo "ERROR: PR_NUMBER must be numeric" >&2
            exit 1
          fi
          if ! [[ "${EXPECTED_HEAD_SHA:-}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "ERROR: expected_head_sha must be a 40-character git SHA" >&2
            exit 1
          fi
          if [ -z "${POLICY_APPROVAL_RECEIPT:-}" ]; then
            echo "ERROR: policy approval receipt is required for v4 canary execution" >&2
            exit 1
          fi

          gh pr view "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --json title,baseRefOid,headRefOid,headRefName,headRepository,url \
            > pr_metadata.json

          PR_HEAD_SHA="$(jq -r '.headRefOid // empty' pr_metadata.json)"
          PR_BASE_SHA="$(jq -r '.baseRefOid // empty' pr_metadata.json)"
          PR_HEAD_REPO="$(jq -r '.headRepository.nameWithOwner // empty' pr_metadata.json)"
          if [ -z "${PR_HEAD_SHA:-}" ] || [ -z "${PR_BASE_SHA:-}" ] || [ -z "${PR_HEAD_REPO:-}" ]; then
            echo "ERROR: Unable to resolve PR head/base metadata" >&2
            exit 1
          fi
          if ! [[ "$PR_HEAD_SHA" =~ ^[0-9a-f]{40}$ ]] || ! [[ "$PR_BASE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "ERROR: PR head/base metadata must contain full 40-character git SHAs" >&2
            exit 1
          fi
          if [ "$PR_HEAD_REPO" != "$GITHUB_REPOSITORY" ]; then
            echo "ERROR: Refusing to run v4 canary for fork PR head from ${PR_HEAD_REPO}" >&2
            exit 1
          fi
          if [ "$EXPECTED_HEAD_SHA" != "$PR_HEAD_SHA" ]; then
            echo "ERROR: expected_head_sha does not match live PR head (expected ${EXPECTED_HEAD_SHA}, live ${PR_HEAD_SHA})" >&2
            exit 1
          fi

          CURRENT_REF_NAME="${GITHUB_REF_NAME:-}"
          TRUSTED_REF_NAME="$(gh repo view "$GITHUB_REPOSITORY" --json defaultBranchRef --jq '.defaultBranchRef.name // empty')"
          if [ -z "$CURRENT_REF_NAME" ] || [ -z "$TRUSTED_REF_NAME" ] || [ "$CURRENT_REF_NAME" != "$TRUSTED_REF_NAME" ]; then
            echo "ERROR: workflow_dispatch must run on the trusted default branch (expected ${TRUSTED_REF_NAME:-unknown}, got ${CURRENT_REF_NAME:-unknown})" >&2
            exit 1
          fi

          {
            echo "PR_HEAD_SHA=$PR_HEAD_SHA"
            echo "PR_BASE_SHA=$PR_BASE_SHA"
          } >> "$GITHUB_ENV"
          printf '%s\n' "$PR_HEAD_SHA" > pr_head_sha.txt
          printf '%s\n' "$PR_BASE_SHA" > pr_base_sha.txt
          printf '%s\n' "missing" > pr_check_surface_state.txt

      - name: Publish PR check surface
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          REVIEW_RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          python3 scripts/pr-assistant/pr-assistant-v4-evidence-canary.py build-check-payload \
            --repo "$GITHUB_REPOSITORY" \
            --pr-number "$PR_NUMBER" \
            --base-sha "$PR_BASE_SHA" \
            --head-sha "$PR_HEAD_SHA" \
            --run-id "$GITHUB_RUN_ID" \
            --run-url "$REVIEW_RUN_URL" \
            --check-surface "pending_verification" \
            --dispatch-source "workflow_dispatch" \
            --trigger-comment-id "${TRIGGER_COMMENT_ID:-}" \
            --policy-approval-receipt "$POLICY_APPROVAL_RECEIPT" \
            --output pr_check_run_payload.json

          CHECK_EXTERNAL_ID="merglbot-pr-assistant-v4-canary-${GITHUB_RUN_ID}"
          EXISTING_CHECK_ID=""
          if gh api --paginate "repos/${GITHUB_REPOSITORY}/commits/${PR_HEAD_SHA}/check-runs?per_page=100&filter=all" > pr_check_runs_for_publish.json 2> pr_check_runs_for_publish.err; then
            EXISTING_CHECK_ID="$(
              jq -sr --arg name "Merglbot PR Assistant v4" --arg external_id "$CHECK_EXTERNAL_ID" '
                [ .[]?.check_runs[]?
                  | select((.name // "") == $name)
                  | select((.external_id // "") == $external_id)
                  | .id
                ][0] // empty
              ' pr_check_runs_for_publish.json
            )"
          else
            echo "WARN: unable to list existing check runs before publish; continuing with create attempt" >&2
          fi

          CHECK_PUBLISH_STATE="published"
          if [ -n "${EXISTING_CHECK_ID:-}" ]; then
            jq 'del(.head_sha)' pr_check_run_payload.json > pr_check_run_update_payload.json
            if ! gh api "repos/${GITHUB_REPOSITORY}/check-runs/${EXISTING_CHECK_ID}" \
              --method PATCH \
              --input pr_check_run_update_payload.json > pr_check_run_response.json; then
              CHECK_PUBLISH_STATE="publish_failed"
            fi
          else
            if ! gh api "repos/${GITHUB_REPOSITORY}/check-runs" \
              --method POST \
              --input pr_check_run_payload.json > pr_check_run_response.json; then
              CHECK_PUBLISH_STATE="publish_failed"
            fi
          fi

          if [ "$CHECK_PUBLISH_STATE" = "published" ] && jq -e '.id and .head_sha' pr_check_run_response.json >/dev/null 2>&1; then
            printf '%s\n' "published" > pr_check_surface_state.txt
          else
            printf '%s\n' "publish_failed" > pr_check_surface_state.txt
          fi

      - name: Verify PR check surface
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          CHECK_SURFACE_STATE="$(tr -d '\r\n' < pr_check_surface_state.txt 2>/dev/null || true)"
          if [ "$CHECK_SURFACE_STATE" != "published" ]; then
            echo "WARN: Skipping PR check surface verification because publish state is ${CHECK_SURFACE_STATE:-unknown}" >&2
            exit 0
          fi

          CHECK_EXTERNAL_ID="merglbot-pr-assistant-v4-canary-${GITHUB_RUN_ID}"
          MATCH_COUNT="0"
          for _ in $(seq 1 12); do
            if gh api --paginate "repos/${GITHUB_REPOSITORY}/commits/${PR_HEAD_SHA}/check-runs?per_page=100&filter=all" 2> pr_head_check_runs.err \
              | jq -s '{check_runs: (map(.check_runs // []) | add // [])}' > pr_head_check_runs.json.tmp 2> pr_head_check_runs_jq.err; then
              mv -f pr_head_check_runs.json.tmp pr_head_check_runs.json
              MATCH_COUNT="$(jq -r --arg name "Merglbot PR Assistant v4" --arg external_id "$CHECK_EXTERNAL_ID" --arg head_sha "$PR_HEAD_SHA" '
                [
                  (.check_runs // [])[]?
                  | select((.name // "") == $name)
                  | select((.external_id // "") == $external_id)
                  | select((.head_sha // "") == $head_sha)
                ] | length
              ' pr_head_check_runs.json 2>/dev/null || echo "0")"
              if [[ "${MATCH_COUNT:-0}" =~ ^[0-9]+$ ]] && [ "$MATCH_COUNT" -gt 0 ]; then
                printf '%s\n' "verified" > pr_check_surface_state.txt
                exit 0
              fi
            else
              echo "WARN: unable to fetch or parse PR-head check runs during verification attempt" >&2
            fi
            sleep 5
          done
          printf '%s\n' "verify_failed" > pr_check_surface_state.txt

      - name: Post v4 evidence receipt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          REVIEW_RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          CHECK_SURFACE_STATE="$(tr -d '\r\n' < pr_check_surface_state.txt 2>/dev/null || true)"
          if [ -z "${CHECK_SURFACE_STATE:-}" ]; then
            CHECK_SURFACE_STATE="missing"
          fi
          python3 scripts/pr-assistant/pr-assistant-v4-evidence-canary.py render-comment \
            --repo "$GITHUB_REPOSITORY" \
            --pr-number "$PR_NUMBER" \
            --base-sha "$PR_BASE_SHA" \
            --head-sha "$PR_HEAD_SHA" \
            --run-id "$GITHUB_RUN_ID" \
            --run-url "$REVIEW_RUN_URL" \
            --check-surface "$CHECK_SURFACE_STATE" \
            --dispatch-source "workflow_dispatch" \
            --trigger-comment-id "${TRIGGER_COMMENT_ID:-}" \
            --policy-approval-receipt "$POLICY_APPROVAL_RECEIPT" \
            --output comment.md

          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file comment.md
