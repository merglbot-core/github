# Terraform Drift Scan Workflow
#
# Purpose: Weekly drift check entrypoint that delegates to the SSOT Terraform
# validation workflow in `merglbot-core/infra`, where the real terraform roots,
# repo variables, and module access live.

name: Terraform Drift Scan

on:
  schedule:
    # Run every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      workspace:
        description: 'Terraform workspace to scan'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - bootstrap
          - core
          - public
          - clients

permissions:
  contents: read

jobs:
  dispatch-infra-validation:
    name: Dispatch Infra Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      delegated_run_id: ${{ steps.dispatch.outputs.run_id }}
      delegated_run_url: ${{ steps.dispatch.outputs.run_url }}
      selected_workspace: ${{ steps.dispatch.outputs.workspace }}

    steps:
      - name: Dispatch terraform-sync-validation in merglbot-core/infra
        id: dispatch
        env:
          GH_TOKEN: ${{ secrets.MCP_GH_PAT }}
          TARGET_REPO: merglbot-core/infra
          TARGET_WORKFLOW: terraform-sync-validation.yml
          TARGET_REF: main
          SELECTED_WORKSPACE: ${{ github.event_name == 'workflow_dispatch' && inputs.workspace || 'all' }}
        run: |
          set -euo pipefail

          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::error::Missing required secret MCP_GH_PAT for cross-repo workflow dispatch"
            exit 1
          fi

          BEFORE_JSON="$(gh run list \
            -R "${TARGET_REPO}" \
            --workflow "${TARGET_WORKFLOW}" \
            --branch "${TARGET_REF}" \
            --event workflow_dispatch \
            --limit 20 \
            --json databaseId)"

          gh workflow run "${TARGET_WORKFLOW}" \
            -R "${TARGET_REPO}" \
            --ref "${TARGET_REF}" \
            -f workspace="${SELECTED_WORKSPACE}" \
            -f slack_always=false >/dev/null

          BEFORE_IDS="$(echo "${BEFORE_JSON}" | jq '[.[].databaseId]')"

          RUN_JSON=""
          for _ in $(seq 1 30); do
            RUN_JSON="$(gh run list \
              -R "${TARGET_REPO}" \
              --workflow "${TARGET_WORKFLOW}" \
              --branch "${TARGET_REF}" \
              --event workflow_dispatch \
              --limit 20 \
              --json databaseId,status,conclusion,createdAt,url | \
              jq --argjson before "${BEFORE_IDS}" '
                map(select([.databaseId] | inside($before) | not)) |
                sort_by(.databaseId) |
                reverse |
                .[0]
              ')"

            if [[ "${RUN_JSON}" != "null" && -n "${RUN_JSON}" ]]; then
              break
            fi

            sleep 2
          done

          if [[ "${RUN_JSON}" == "null" || -z "${RUN_JSON}" ]]; then
            echo "::error::Failed to capture delegated infra workflow run"
            exit 1
          fi

          RUN_ID="$(echo "${RUN_JSON}" | jq -r '.databaseId')"
          RUN_URL="$(echo "${RUN_JSON}" | jq -r '.url')"

          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"
          echo "run_url=${RUN_URL}" >> "$GITHUB_OUTPUT"
          echo "workspace=${SELECTED_WORKSPACE}" >> "$GITHUB_OUTPUT"

          echo "## Delegated Terraform Drift Scan" >> "$GITHUB_STEP_SUMMARY"
          echo "- Workspace: ${SELECTED_WORKSPACE}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Infra run: ${RUN_URL}" >> "$GITHUB_STEP_SUMMARY"

  wait-for-infra-validation:
    name: Wait For Infra Validation
    needs: dispatch-infra-validation
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Wait for delegated run
        env:
          GH_TOKEN: ${{ secrets.MCP_GH_PAT }}
          TARGET_REPO: merglbot-core/infra
          RUN_ID: ${{ needs.dispatch-infra-validation.outputs.delegated_run_id }}
        run: |
          set -euo pipefail
          gh run watch "${RUN_ID}" -R "${TARGET_REPO}" --exit-status

      - name: Summarize delegated result
        if: always()
        env:
          GH_TOKEN: ${{ secrets.MCP_GH_PAT }}
          TARGET_REPO: merglbot-core/infra
          RUN_ID: ${{ needs.dispatch-infra-validation.outputs.delegated_run_id }}
          RUN_URL: ${{ needs.dispatch-infra-validation.outputs.delegated_run_url }}
          SELECTED_WORKSPACE: ${{ needs.dispatch-infra-validation.outputs.selected_workspace }}
        run: |
          set -euo pipefail

          STATUS_JSON="$(gh run view "${RUN_ID}" -R "${TARGET_REPO}" --json status,conclusion)"
          STATUS="$(echo "${STATUS_JSON}" | jq -r '.status')"
          CONCLUSION="$(echo "${STATUS_JSON}" | jq -r '.conclusion')"

          echo "## Infra Validation Result" >> "$GITHUB_STEP_SUMMARY"
          echo "- Workspace: ${SELECTED_WORKSPACE}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Run: ${RUN_URL}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: ${STATUS}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Conclusion: ${CONCLUSION}" >> "$GITHUB_STEP_SUMMARY"
