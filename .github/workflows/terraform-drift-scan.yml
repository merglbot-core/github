name: Terraform Drift Scan (Moved to infra)

on:
  workflow_dispatch:
    inputs:
      workspace:
        description: 'Terraform workspace to validate in merglbot-core/infra'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - bootstrap
          - core
          - public
          - clients
          - clients/autodoplnky
          - clients/cerano
          - clients/denatura
          - clients/hodinarstvi
          - clients/kazdavterina
          - clients/kiteboarding
          - clients/livero
          - clients/proteinaco
          - clients/ruzovyslon
          - ops
          - ops/bq-dts-iam
          - ops/forecast-self-heal-iam
          - poc
          - poc/ruzovyslon_kbc_poc

permissions:
  contents: read

jobs:
  moved-to-infra:
    name: Compatibility Notice
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Explain authoritative workflow location
        env:
          SELECTED_WORKSPACE: ${{ inputs.workspace }}
        run: |
          set -euo pipefail

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Terraform Drift Validation Moved

          No Terraform drift validation was executed in \`${GITHUB_REPOSITORY}\`.

          The authoritative scheduled drift validation now lives in:
          - \`merglbot-core/infra/.github/workflows/terraform-sync-validation.yml\`

          Selected workspace:
          - \`${SELECTED_WORKSPACE}\`

          To run the authoritative workflow manually:

          \`\`\`bash
          gh workflow run terraform-sync-validation.yml -R merglbot-core/infra --ref main -f workspace=${SELECTED_WORKSPACE}
          \`\`\`

          This compatibility workflow is manual-only and intentionally does not:
          - authenticate to GCP
          - run \`terraform init\` or \`terraform plan\`
          - upload drift artifacts
          - create drift issues
          EOF
