name: ENT Dependabot Weekly Closeout

on:
  schedule:
    # Monday 07:30 UTC = 08:30 CET / 09:30 CEST for Europe/Prague.
    # Scheduled 30 minutes after ent-scope-refresh.yml (Monday 07:00 UTC).
    # In Actions, closeout resolves live scope from ENT_ORG_ALLOWLIST.md plus
    # non-archived/non-fork repository metadata; the repo-local scope file is
    # only a generated mirror for local single_repo diagnostics.
    - cron: "30 7 * * 1"
  workflow_dispatch:
    inputs:
      mode:
        description: "Use dry-run for manual validation; scheduled runs use apply."
        required: true
        type: choice
        options:
          - dry-run
          - apply
        default: dry-run
      repo_scope:
        description: "Scope selector"
        required: true
        type: choice
        options:
          - all
          - single_repo
        default: single_repo
      single_repo:
        description: "owner/repo when repo_scope=single_repo; defaults to safe docs smoke"
        required: false
        type: string
        default: merglbot-public/docs
      max_prs_per_repo:
        description: "0 means unlimited"
        required: false
        type: number
        default: 0
      slack_notify:
        description: "Post telemetry to Slack"
        required: false
        type: boolean
        default: true
      pr_allowlist:
        description: "Optional owner/repo#PR or PR URLs approved for manual apply mode"
        required: false
        type: string
      approval_note:
        description: "Human approval note or approval packet URL for manual apply mode"
        required: false
        type: string
      approval_issue_url:
        description: "Optional GitHub issue URL containing the apply approval packet"
        required: false
        type: string

permissions:
  actions: read
  checks: read
  contents: read
  issues: write
  pull-requests: write
  statuses: read

concurrency:
  group: ent-dependabot-weekly-closeout
  cancel-in-progress: ${{ github.event_name == 'workflow_dispatch' }}

jobs:
  weekly-closeout:
    uses: ./.github/workflows/ent-dependabot-autonomous-closeout.yml
    with:
      mode: ${{ github.event_name == 'schedule' && 'apply' || github.event.inputs.mode || 'dry-run' }}
      repo_scope: ${{ github.event_name == 'schedule' && 'all' || github.event.inputs.repo_scope || 'single_repo' }}
      single_repo: ${{ github.event.inputs.single_repo || '' }}
      max_parallel_repos: 3
      max_prs_per_repo: ${{ fromJSON(github.event_name == 'schedule' && '0' || github.event.inputs.max_prs_per_repo || '0') }}
      max_fix_iterations: 2
      max_review_iterations: 2
      allow_policy_alignment: true
      comment_report: true
      tracking_issue: "https://github.com/merglbot-public/docs/issues/636"
      slack_notify: ${{ github.event_name == 'schedule' && true || fromJSON(github.event.inputs.slack_notify || 'true') }}
      pr_allowlist: ${{ github.event.inputs.pr_allowlist || '' }}
      approval_note: ${{ github.event_name == 'schedule' && 'scheduled weekly run' || github.event.inputs.approval_note || '' }}
      approval_issue_url: ${{ github.event.inputs.approval_issue_url || '' }}
    secrets: inherit
