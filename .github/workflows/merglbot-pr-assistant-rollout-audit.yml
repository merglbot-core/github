name: PR Assistant Rollout Audit

on:
  pull_request:
    paths:
      - "scripts/pr-assistant/repo-policy-inventory-policy.json"
      - "scripts/pr-assistant/repo-policy-manifest.json"
      - "scripts/pr-assistant/repo-policy-manifest.py"
      - "scripts/pr-assistant/target-repos.txt"
      - "scripts/pr-assistant/deploy-v3.sh"
      - "scripts/pr-assistant/rollout-enterprise-campaign.sh"
      - "scripts/pr-assistant/generate-improvement-digest.sh"
      - "scripts/pr-assistant/baselines/**"
  push:
    branches: [main]
    paths:
      - "scripts/pr-assistant/repo-policy-inventory-policy.json"
      - "scripts/pr-assistant/repo-policy-manifest.json"
      - "scripts/pr-assistant/repo-policy-manifest.py"
      - "scripts/pr-assistant/target-repos.txt"
      - "scripts/pr-assistant/deploy-v3.sh"
      - "scripts/pr-assistant/rollout-enterprise-campaign.sh"
      - "scripts/pr-assistant/generate-improvement-digest.sh"
      - "scripts/pr-assistant/baselines/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-assistant-rollout-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rollout-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Verify manifest, compatibility target list, and coverage baseline
        env:
          GH_TOKEN: ${{ secrets.ENTERPRISE_GITHUB_TOKEN || github.token }}
        run: |
          set -euo pipefail

          if python3 - <<'PY'
          import json, subprocess, sys
          policy = json.load(open("scripts/pr-assistant/repo-policy-inventory-policy.json", encoding="utf-8"))
          visible = {
              org["login"]
              for org in json.loads(subprocess.check_output(["gh", "api", "/user/orgs", "--paginate"], text=True))
              if org["login"] not in set(policy["excluded_orgs"])
          }
          missing = sorted(set(policy["required_orgs"]) - visible)
          if missing:
              print("missing org visibility:", ", ".join(missing))
              sys.exit(1)
          PY
          then
            python3 scripts/pr-assistant/repo-policy-manifest.py verify --token-env GH_TOKEN
            python3 scripts/pr-assistant/repo-policy-manifest.py verify-review-owner-alignment --token-env GH_TOKEN
            exit 0
          fi

          python3 scripts/pr-assistant/repo-policy-manifest.py verify-manifest
          {
            echo "## PR Assistant Rollout Audit"
            echo ""
            echo "- Cross-repo live inventory verification skipped in Actions because the available token cannot read every required org."
            echo "- Manifest schema, compatibility target list, and committed baseline artifact were still verified locally."
            echo "- Run the same workflow with the enterprise-wide token (or re-run locally with broader GitHub access) to verify the full 12-org / 41-managed-repo rollout scope."
          } >> "$GITHUB_STEP_SUMMARY"
