name: PR Assistant Rollout Audit

on:
  pull_request:
    paths:
      - "scripts/pr-assistant/repo-policy-manifest.json"
      - "scripts/pr-assistant/repo-policy-manifest.py"
      - "scripts/pr-assistant/target-repos.txt"
      - "scripts/pr-assistant/deploy-v3.sh"
      - "scripts/pr-assistant/generate-improvement-digest.sh"
      - "scripts/pr-assistant/baselines/**"
  push:
    branches: [main]
    paths:
      - "scripts/pr-assistant/repo-policy-manifest.json"
      - "scripts/pr-assistant/repo-policy-manifest.py"
      - "scripts/pr-assistant/target-repos.txt"
      - "scripts/pr-assistant/deploy-v3.sh"
      - "scripts/pr-assistant/generate-improvement-digest.sh"
      - "scripts/pr-assistant/baselines/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-assistant-rollout-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rollout-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Verify manifest, compatibility target list, and coverage baseline
        env:
          GH_TOKEN: ${{ secrets.ENTERPRISE_GITHUB_TOKEN || github.token }}
        run: |
          set -euo pipefail
          if gh api repos/merglbot-core/agents-orchestrator > /dev/null 2>&1; then
            python3 scripts/pr-assistant/repo-policy-manifest.py verify --token-env GH_TOKEN
            exit 0
          fi

          python3 scripts/pr-assistant/repo-policy-manifest.py verify-manifest
          {
            echo "## PR Assistant Rollout Audit"
            echo ""
            echo "- Cross-repo live audit skipped in Actions because the available token cannot read the full rollout scope."
            echo "- Manifest schema, compatibility target list, and committed baseline artifact were still verified locally."
            echo "- Run the same workflow with an enterprise-wide token (or re-run locally with broader GitHub access) to refresh the authoritative live audit."
          } >> "$GITHUB_STEP_SUMMARY"
