name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Validate PR Assistant helper scripts
        run: |
          set -euo pipefail
          bash -n scripts/pr-assistant/pr-assistant-step1-parallel-api-calls.sh
          bash -n scripts/pr-assistant/secret-scan-patterns-smoke-test.sh
          bash scripts/pr-assistant/secret-scan-patterns-smoke-test.sh
