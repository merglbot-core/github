name: Deploy to Cloud Run (WIF)

on:
  workflow_call:
    inputs:
      service_name:
        description: 'Cloud Run service name'
        required: true
        type: string
      region:
        description: 'GCP region'
        required: false
        type: string
        default: 'europe-west1'
      image_name:
        description: 'Container image name (without registry prefix)'
        required: true
        type: string
      deploy_project_id:
        description: 'Cloud Run deploy project ID (defaults to secret GCP_PROJECT_ID)'
        required: false
        type: string
        default: ''
      artifact_project_id:
        description: 'Artifact Registry project ID (defaults to deploy project)'
        required: false
        type: string
        default: ''
      artifact_location:
        description: 'Artifact Registry location (defaults to Cloud Run region)'
        required: false
        type: string
        default: ''
      artifact_repository:
        description: 'Artifact Registry repository name'
        required: false
        type: string
        default: 'containers'
      dockerfile:
        description: 'Path to Dockerfile'
        required: false
        type: string
        default: 'Dockerfile'
      environment_name:
        description: 'GitHub Environment name for the deploy job'
        required: false
        type: string
        default: ''
      environment_url:
        description: 'Optional GitHub Environment URL for the deploy job'
        required: false
        type: string
        default: ''
      runtime_service_account:
        description: 'Optional runtime service account email for Cloud Run'
        required: false
        type: string
        default: ''
      wif_provider:
        description: 'Optional WIF provider when caller stores auth metadata in vars'
        required: false
        type: string
        default: ''
      wif_service_account:
        description: 'Optional WIF service account when caller stores auth metadata in vars'
        required: false
        type: string
        default: ''
      ingress:
        description: 'Cloud Run ingress setting'
        required: false
        type: string
        default: ''
      memory:
        description: 'Cloud Run memory allocation'
        required: false
        type: string
        default: '512Mi'
      cpu:
        description: 'Cloud Run CPU allocation'
        required: false
        type: string
        default: '1'
      timeout:
        description: 'Cloud Run request timeout in seconds'
        required: false
        type: number
        default: 300
      port:
        description: 'Cloud Run container port'
        required: false
        type: number
        default: 8080
      allow_unauthenticated:
        description: 'Allow unauthenticated access to the deployed service (true = public internet access). REQUIRED: callers must set this explicitly.'
        required: true
        type: boolean
      environment:
        description: 'Environment (staging/production)'
        required: false
        type: string
        default: 'staging'
      min_instances:
        description: 'Minimum instances'
        required: false
        type: number
        default: 0
      max_instances:
        description: 'Maximum instances'
        required: false
        type: number
        default: 10
    secrets:
      WIF_PROVIDER:
        description: 'Workload Identity Federation provider'
        required: false
      WIF_SERVICE_ACCOUNT:
        description: 'Service account email for WIF'
        required: false
      GCP_PROJECT_ID:
        description: 'GCP Project ID'
        required: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Build, scan, and deploy usually <15m; buffer for registry latency
    environment:
      name: ${{ inputs.environment_name != '' && inputs.environment_name || inputs.environment }}
      url: ${{ inputs.environment_url }}
    permissions:
      contents: read
      id-token: write  # Required for WIF OIDC token
      security-events: write  # Needed for SARIF upload

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Resolve WIF parameters
        shell: bash
        env:
          INPUT_WIF_PROVIDER: ${{ inputs.wif_provider }}
          INPUT_WIF_SERVICE_ACCOUNT: ${{ inputs.wif_service_account }}
          SECRET_WIF_PROVIDER: ${{ secrets.WIF_PROVIDER }}
          SECRET_WIF_SERVICE_ACCOUNT: ${{ secrets.WIF_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail

          WIF_PROVIDER="${INPUT_WIF_PROVIDER:-$SECRET_WIF_PROVIDER}"
          WIF_SERVICE_ACCOUNT="${INPUT_WIF_SERVICE_ACCOUNT:-$SECRET_WIF_SERVICE_ACCOUNT}"

          if [ -z "$WIF_PROVIDER" ]; then
            echo "::error::wif_provider is empty and secret WIF_PROVIDER is not set"
            exit 1
          fi

          if [ -z "$WIF_SERVICE_ACCOUNT" ]; then
            echo "::error::wif_service_account is empty and secret WIF_SERVICE_ACCOUNT is not set"
            exit 1
          fi

          echo "::add-mask::$WIF_PROVIDER"
          echo "::add-mask::$WIF_SERVICE_ACCOUNT"

          {
            printf 'WIF_PROVIDER=%s\n' "$WIF_PROVIDER"
            printf 'WIF_SERVICE_ACCOUNT=%s\n' "$WIF_SERVICE_ACCOUNT"
          } >> "$GITHUB_ENV"

      - name: Authenticate to GCP (WIF)
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
          token_format: 'access_token'

      - name: Resolve deployment parameters
        shell: bash
        env:
          INPUT_DEPLOY_PROJECT_ID: ${{ inputs.deploy_project_id }}
          INPUT_ARTIFACT_PROJECT_ID: ${{ inputs.artifact_project_id }}
          INPUT_ARTIFACT_LOCATION: ${{ inputs.artifact_location }}
          INPUT_ARTIFACT_REPOSITORY: ${{ inputs.artifact_repository }}
          INPUT_REGION: ${{ inputs.region }}
          SECRET_GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail

          DEPLOY_PROJECT_ID="${INPUT_DEPLOY_PROJECT_ID:-$SECRET_GCP_PROJECT_ID}"
          ARTIFACT_PROJECT_ID="${INPUT_ARTIFACT_PROJECT_ID:-$DEPLOY_PROJECT_ID}"
          ARTIFACT_LOCATION="${INPUT_ARTIFACT_LOCATION:-$INPUT_REGION}"
          ARTIFACT_REPOSITORY="${INPUT_ARTIFACT_REPOSITORY}"

          if [ -z "$DEPLOY_PROJECT_ID" ]; then
            echo "::error::deploy_project_id is empty and secret GCP_PROJECT_ID is not set"
            exit 1
          fi

          if [ -z "$ARTIFACT_PROJECT_ID" ]; then
            echo "::error::artifact_project_id could not be resolved"
            exit 1
          fi

          if [ -z "$ARTIFACT_LOCATION" ]; then
            echo "::error::artifact_location could not be resolved"
            exit 1
          fi

          if [ -z "$ARTIFACT_REPOSITORY" ]; then
            echo "::error::artifact_repository could not be resolved"
            exit 1
          fi

          {
            printf 'DEPLOY_PROJECT_ID=%s\n' "$DEPLOY_PROJECT_ID"
            printf 'ARTIFACT_PROJECT_ID=%s\n' "$ARTIFACT_PROJECT_ID"
            printf 'ARTIFACT_LOCATION=%s\n' "$ARTIFACT_LOCATION"
            printf 'ARTIFACT_REPOSITORY=%s\n' "$ARTIFACT_REPOSITORY"
          } >> "$GITHUB_ENV"

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3.0.1
        with:
          project_id: ${{ env.DEPLOY_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker "${ARTIFACT_LOCATION}-docker.pkg.dev" --quiet

      - name: Build Container Image
        env:
          INPUT_DOCKERFILE: ${{ inputs.dockerfile }}
          INPUT_IMAGE_NAME: ${{ inputs.image_name }}
        run: |
          IMAGE="${ARTIFACT_LOCATION}-docker.pkg.dev/${ARTIFACT_PROJECT_ID}/${ARTIFACT_REPOSITORY}/${INPUT_IMAGE_NAME}:${{ github.sha }}"
          docker build -t "$IMAGE" -f "$INPUT_DOCKERFILE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      # Container Security: Trivy scan with SARIF upload
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518  # v0.34.1
        continue-on-error: true  # Allow deploy while we tune blocking thresholds
        with:
          image-ref: ${{ env.IMAGE }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL'
          exit-code: '0'         # Do not fail deploy on scan; surfaced via SARIF
          ignore-unfixed: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e  # v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Deploy to Cloud Run
        env:
          INPUT_SERVICE_NAME: ${{ inputs.service_name }}
          INPUT_REGION: ${{ inputs.region }}
          INPUT_ENVIRONMENT: ${{ inputs.environment }}
          INPUT_MIN_INSTANCES: ${{ inputs.min_instances }}
          INPUT_MAX_INSTANCES: ${{ inputs.max_instances }}
          INPUT_TIMEOUT: ${{ inputs.timeout }}
          INPUT_PORT: ${{ inputs.port }}
          INPUT_RUNTIME_SERVICE_ACCOUNT: ${{ inputs.runtime_service_account }}
          INPUT_INGRESS: ${{ inputs.ingress }}
          INPUT_MEMORY: ${{ inputs.memory }}
          INPUT_CPU: ${{ inputs.cpu }}
          INPUT_ALLOW_UNAUTHENTICATED: ${{ inputs.allow_unauthenticated }}
        run: |
          set -euo pipefail

          deploy_args=(
            "${INPUT_SERVICE_NAME}"
            "--image" "${IMAGE}"
            "--region" "${INPUT_REGION}"
            "--project" "${DEPLOY_PROJECT_ID}"
            "--platform" "managed"
            "--min-instances" "${INPUT_MIN_INSTANCES}"
            "--max-instances" "${INPUT_MAX_INSTANCES}"
            "--set-env-vars=ENVIRONMENT=${INPUT_ENVIRONMENT}"
            "--quiet"
          )

          if [ -n "${INPUT_RUNTIME_SERVICE_ACCOUNT}" ]; then
            deploy_args+=("--service-account" "${INPUT_RUNTIME_SERVICE_ACCOUNT}")
          fi

          if [ -n "${INPUT_INGRESS}" ]; then
            case "${INPUT_INGRESS}" in
              all|internal|internal-and-cloud-load-balancing)
                ;;
              *)
                echo "::error::ingress must be one of: all, internal, internal-and-cloud-load-balancing. Got '${INPUT_INGRESS}'"
                exit 1
                ;;
            esac
            deploy_args+=("--ingress" "${INPUT_INGRESS}")
          fi

          if [ -n "${INPUT_MEMORY}" ]; then
            if ! [[ "${INPUT_MEMORY}" =~ ^[0-9]+(Mi|Gi)$ ]]; then
              echo "::error::memory must match pattern NNNMi or NNNGi, got '${INPUT_MEMORY}'"
              exit 1
            fi
            deploy_args+=("--memory" "${INPUT_MEMORY}")
          fi

          if [ -n "${INPUT_CPU}" ]; then
            if ! [[ "${INPUT_CPU}" =~ ^[0-9]+(\\.[0-9]+)?$ ]]; then
              echo "::error::cpu must be a positive number (e.g. 1, 2, 0.5), got '${INPUT_CPU}'"
              exit 1
            fi
            deploy_args+=("--cpu" "${INPUT_CPU}")
          fi

          if ! [[ "${INPUT_TIMEOUT}" =~ ^[0-9]+$ ]]; then
            echo "::error::timeout must be a non-negative integer, got '${INPUT_TIMEOUT}'"
            exit 1
          fi
          if [ "${INPUT_TIMEOUT}" -le 0 ]; then
            echo "::error::timeout must be a positive integer. Omit the input to use the default. Got '${INPUT_TIMEOUT}'"
            exit 1
          fi
          deploy_args+=("--timeout" "${INPUT_TIMEOUT}")

          if ! [[ "${INPUT_PORT}" =~ ^[0-9]+$ ]]; then
            echo "::error::port must be a non-negative integer, got '${INPUT_PORT}'"
            exit 1
          fi
          if [ "${INPUT_PORT}" -le 0 ]; then
            echo "::error::port must be a positive integer. Omit the input to use the default. Got '${INPUT_PORT}'"
            exit 1
          fi
          deploy_args+=("--port" "${INPUT_PORT}")

          if [ "${INPUT_ALLOW_UNAUTHENTICATED}" = "true" ]; then
            deploy_args+=("--allow-unauthenticated")
          else
            deploy_args+=("--no-allow-unauthenticated")
          fi

          gcloud run deploy "${deploy_args[@]}"

      - name: Get Service URL
        id: url
        env:
          INPUT_SERVICE_NAME: ${{ inputs.service_name }}
          INPUT_REGION: ${{ inputs.region }}
        run: |
          URL=$(gcloud run services describe "${INPUT_SERVICE_NAME}" \
            --region "${INPUT_REGION}" \
            --project "${DEPLOY_PROJECT_ID}" \
            --format 'value(status.url)')
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "🚀 Service deployed to: $URL"

      - name: Health Check
        run: |
          echo "Performing health check..."
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.url.outputs.url }}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed!"
              exit 0
            fi
            echo "Attempt $i: Status $STATUS, retrying..."
            sleep 10
          done
          echo "⚠️ Health check did not pass (may be expected for some services)"
